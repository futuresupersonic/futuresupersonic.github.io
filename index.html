      { title: "Childish Gambino - Feels LIke Summer",             artist: "Childish Gambino",                  album: "Feels Like Summer - Single",  duration: 286, src: "./audio/feels-like-summer.mp3" },
      { title: "K-OS - Man I Used To Be",                          artist: "K-OS",                              album: "Atlantis: Hymns for Disco",   duration: 305, src: "./audio/3-man-i-used-to-be.mp3" },
      { title: "Ryuichi Sakamoto - Alva Noto",                     artist: "Ryuichi Sakamoto & Alva Noto",      album: "Insen",                       duration: 180, src: "./audio/theme-alva-noto.mp3" },
      { title: "Cornelius - Point of View Point",                  artist: "Cornelius",                         album: "Point",                       duration: 270, src: "./audio/point-of-view-point.mp3" },
      { title: "Daft Punk - Contact",                              artist: "Daft Punk",                         album: "Random Access Memories",      duration: 381, src: "./audio/contact.mp3" },
      { title: "Sachiko Kanenobu - Aoi Sakana (Blue Fish)",        artist: "Sachiko Kanenobu",                  album: "Misora",                      duration: 180, src: "./audio/aoi-sakana.mp3" },
    ];
    const PLAYLISTS = [
      { name: "Hip-Hop Heavy",   indices: [0, 1, 5, 6] },
      { name: "Late Night",      indices: [2, 4, 7, 9] },
      { name: "Underground",     indices: [3, 8] },
      { name: "Everything",      indices: TRACKS.map((_, i) => i) },
    ];

    const audio = document.createElement("audio");
    audio.preload = "metadata";
    document.body.appendChild(audio);

    const ipod        = rootEl.querySelector('.ipod');
    const lock        = rootEl.querySelector('[data-lock]');
    const titleEl     = rootEl.querySelector('[data-title]');
    const bodyEl      = rootEl.querySelector('[data-body]');
    const playStateEl = rootEl.querySelector('[data-playstate]');
    const wheel       = rootEl.querySelector('[data-wheel]');
    const btnMenu     = rootEl.querySelector('[data-btn-menu]');
    const btnPrev     = rootEl.querySelector('[data-btn-prev]');
    const btnNext     = rootEl.querySelector('[data-btn-next]');
    const btnPlay     = rootEl.querySelector('[data-btn-play]');
    const btnCenter   = rootEl.querySelector('[data-btn-center]');

    const state = {
      on: false,
      stack: [],
      nowPlayingIdx: null,
      isPlaying: false,
      volume: 0.7,
      backlight: true,
      shuffle: false,
      lastError: null,
    };
    audio.volume = state.volume;

    function fmtTime(sec) {
      if (!isFinite(sec) || sec < 0) sec = 0;
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ":" + String(s).padStart(2, "0");
    }

    function makeMainMenu() {
      return { id: "main", title: "Ben's iPod", kind: "menu", sel: 0,
        items: [
          { label: "Now Playing", action: () => push(makeNowPlaying()), trailing: "▶" },
          { label: "All Songs",   action: () => push(makeAllSongs()), trailing: "›" },
          { label: "Playlists",   action: () => push(makePlaylistsMenu()), trailing: "›" },
          { label: "Settings",    action: () => push(makeSettings()), trailing: "›" },
        ] };
    }
    function makeAllSongs() {
      return { id: "songs", title: "All Songs", kind: "menu", sel: 0,
        items: TRACKS.map((t, i) => ({ label: t.title, action: () => playTrack(i), trailing: "" })) };
    }
    function makePlaylistsMenu() {
      return { id: "playlists", title: "Playlists", kind: "menu", sel: 0,
        items: PLAYLISTS.map((pl, i) => ({ label: pl.name, action: () => push(makePlaylist(i)), trailing: "›" })) };
    }
    function makePlaylist(plIdx) {
      const pl = PLAYLISTS[plIdx];
      return { id: "pl-" + plIdx, title: pl.name, kind: "menu", sel: 0,
        items: pl.indices.map(i => ({ label: TRACKS[i].title, action: () => playTrack(i), trailing: "" })) };
    }
    function makeSettings() {
      return { id: "settings", title: "Settings", kind: "settings", sel: 0,
        rows: [
          { label: "Volume",    type: "volume" },
          { label: "Shuffle",   type: "toggle", key: "shuffle" },
          { label: "Backlight", type: "toggle", key: "backlight" },
          { label: "About",     type: "info",   text: "ben's iPod · v1.0" },
        ] };
    }
    function makeNowPlaying() {
      return { id: "nowplaying", title: "Now Playing", kind: "nowplaying", sel: 0 };
    }

    function current() { return state.stack[state.stack.length - 1]; }
    function push(screen) { state.stack.push(screen); render(); }
    function pop() { if (state.stack.length > 1) { state.stack.pop(); render(); } }
    function powerOn() {
      if (state.on) return;
      state.on = true;
      ipod.classList.add("is-on");
      if (state.stack.length === 0) state.stack.push(makeMainMenu());
      render();
    }
    function pause() {
      if (state.isPlaying) {
        audio.pause();
        state.isPlaying = false;
        updatePlayState();
      }
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= TRACKS.length) return;
      state.nowPlayingIdx = idx;
      const t = TRACKS[idx];
      if (t.src) {
        audio.src = t.src;
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.then === "function") {
          playPromise.then(() => {
            state.isPlaying = true;
            state.lastError = null;
            updatePlayState();
          }).catch(err => {
            state.isPlaying = false;
            state.lastError = err && err.name ? err.name + ": " + (err.message || "playback failed") : "playback failed";
            updatePlayState();
            if (current() && current().kind === "nowplaying") renderNowPlaying();
          });
        }
      } else {
        state.isPlaying = true; state.lastError = null; updatePlayState();
      }
      if (current().id !== "nowplaying") push(makeNowPlaying());
      else render();
    }

    audio.addEventListener("error", () => {
      const e = audio.error;
      const codes = { 1: "ABORTED", 2: "NETWORK", 3: "DECODE", 4: "NOT_SUPPORTED" };
      state.isPlaying = false;
      state.lastError = "Audio error: " + (codes[e && e.code] || "unknown") +
                       " — check the file path and that you're serving via http://, not file://";
      updatePlayState();
      if (current() && current().kind === "nowplaying") renderNowPlaying();
    });

    function togglePlay() {
      if (state.nowPlayingIdx === null) { playTrack(0); return; }
      if (state.isPlaying) { audio.pause(); state.isPlaying = false; }
      else { if (audio.src) audio.play().catch(() => {}); state.isPlaying = true; }
      updatePlayState();
    }
    function nextTrack() {
      if (state.nowPlayingIdx === null) return playTrack(0);
      const next = (state.shuffle)
        ? Math.floor(Math.random() * TRACKS.length)
        : (state.nowPlayingIdx + 1) % TRACKS.length;
      playTrack(next);
    }
    function prevTrack() {
      if (state.nowPlayingIdx === null) return playTrack(0);
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      const p = (state.nowPlayingIdx - 1 + TRACKS.length) % TRACKS.length;
      playTrack(p);
    }
    audio.addEventListener("ended", nextTrack);
    audio.addEventListener("timeupdate", () => {
      if (current() && current().kind === "nowplaying") renderNowPlaying();
    });

    let simT = 0, simLast = performance.now();
    function simStep() {
      const now = performance.now();
      const dt = (now - simLast) / 1000;
      simLast = now;
      if (state.isPlaying && state.nowPlayingIdx !== null && !audio.src) {
        simT += dt;
        const dur = TRACKS[state.nowPlayingIdx].duration;
        if (simT >= dur) { simT = 0; nextTrack(); }
        if (current() && current().kind === "nowplaying") renderNowPlaying();
      }
      requestAnimationFrame(simStep);
    }
    requestAnimationFrame(simStep);
    let lastSimIdx = null;
    setInterval(() => {
      if (state.nowPlayingIdx !== lastSimIdx) { simT = 0; lastSimIdx = state.nowPlayingIdx; }
    }, 100);

    function updatePlayState() {
      playStateEl.className = state.isPlaying ? "play-icon" : "pause-icon";
    }

    function render() {
      const s = current();
      if (!s) return;
      titleEl.textContent = s.title;
      if (s.kind === "menu") {
        bodyEl.innerHTML = '<div class="ipod-list" data-list></div>';
        const list = bodyEl.querySelector("[data-list]");
        s.items.forEach((it, i) => {
          const row = document.createElement("div");
          row.className = "row" + (i === s.sel ? " is-sel" : "");
          row.innerHTML = '<span class="lbl">' + it.label + '</span><span class="arr">' + (it.trailing || "") + '</span>';
          row.addEventListener("click", () => {
            s.sel = i; render();
            setTimeout(() => it.action && it.action(), 80);
          });
          list.appendChild(row);
        });
        ensureSelVisible();
      } else if (s.kind === "nowplaying") {
        renderNowPlaying();
      } else if (s.kind === "settings") {
        renderSettings();
      }
    }

    function renderNowPlaying() {
      const i = state.nowPlayingIdx;
      if (i === null) {
        bodyEl.innerHTML = '<div class="ipod-np"><div class="np-title">No track selected</div><div class="np-artist">Pick something from All Songs.</div></div>';
        return;
      }
      const t = TRACKS[i];
      const total = audio.src && isFinite(audio.duration) ? audio.duration : t.duration;
      const cur = audio.src ? audio.currentTime : simT;
      const pct = total ? (cur / total) * 100 : 0;
      const errBlock = state.lastError ? '<div class="np-error">' + state.lastError + '</div>' : '';
      bodyEl.innerHTML =
        '<div class="ipod-np">' +
          '<div class="np-icon">♪</div>' +
          '<div class="np-title">' + t.title + '</div>' +
          '<div class="np-artist">' + t.artist + '</div>' +
          '<div class="np-album">' + t.album + '  ·  ' + (i+1) + ' of ' + TRACKS.length + '</div>' +
          errBlock +
          '<div class="np-progress"><div class="np-progress-fill" style="width:' + pct.toFixed(2) + '%"></div></div>' +
          '<div class="np-times"><span>' + fmtTime(cur) + '</span><span>-' + fmtTime(total - cur) + '</span></div>' +
        '</div>';
    }

    function renderSettings() {
      const s = current();
      let html = '<div class="ipod-settings">';
      s.rows.forEach((r, i) => {
        const selCls = i === s.sel ? " is-sel" : "";
        if (r.type === "toggle") {
          const v = state[r.key] ? "On" : "Off";
          html += '<div class="row' + selCls + '" data-i="' + i + '"><span class="lbl">' + r.label + '</span><span class="arr">' + v + '</span></div>';
        } else if (r.type === "volume") {
          html += '<div class="row' + selCls + '" data-i="' + i + '"><span class="lbl">' + r.label + '</span><span class="vol-bar" style="width:90px"><span class="vol-fill" style="width:' + Math.round(state.volume * 100) + '%"></span></span></div>';
        } else if (r.type === "info") {
          html += '<div class="row' + selCls + '" data-i="' + i + '"><span class="lbl">' + r.label + '</span><span class="arr">' + r.text + '</span></div>';
        }
      });
      html += '</div>';
      bodyEl.innerHTML = html;
      bodyEl.querySelectorAll(".row").forEach(row => {
        row.addEventListener("click", () => {
          s.sel = parseInt(row.dataset.i);
          selectInSettings();
        });
      });
    }

    function selectInSettings() {
      const s = current();
      const r = s.rows[s.sel];
      if (r.type === "toggle") state[r.key] = !state[r.key];
      if (r.type === "volume") {
        const steps = [0, 0.25, 0.5, 0.75, 1];
        const idx = steps.findIndex(v => Math.abs(v - state.volume) < 0.05);
        state.volume = steps[(idx + 1) % steps.length];
        audio.volume = state.volume;
      }
      render();
    }

    function ensureSelVisible() {
      const list = bodyEl.querySelector("[data-list]");
      if (!list) return;
      const sel = list.querySelector(".row.is-sel");
      if (!sel) return;
      const top = sel.offsetTop;
      const bottom = top + sel.offsetHeight;
      const visTop = list.scrollTop;
      const visBot = visTop + list.parentElement.clientHeight;
      if (top < visTop) list.scrollTop = top;
      else if (bottom > visBot) list.scrollTop = bottom - list.parentElement.clientHeight;
    }

    // ---- Click-wheel rotational gesture ----------------------------------
    // The MENU / prev / next / play labels and the center button sit ON the
    // ring, so a real circular drag inevitably starts or passes over them.
    // We therefore track the gesture on the WHOLE wheel (labels included):
    //   • a press that rotates  → scrub the selection (moveSelection)
    //   • a press that does NOT rotate → a tap; let the button's click fire
    // When a rotation happens we suppress the trailing click so a scrub never
    // accidentally triggers MENU / play / select.
    let wheelActive = false;
    let lastAngle = 0;
    let accum = 0;
    let rotated = false; // did this gesture rotate enough to count as a scrub?
    function wheelCenter() {
      const r = wheel.getBoundingClientRect();
      return { cx: r.left + r.width / 2, cy: r.top + r.height / 2, rad: r.width / 2 };
    }
    function angleFrom(px, py, c) { return Math.atan2(py - c.cy, px - c.cx); }
    function distFrom(px, py, c) { return Math.hypot(px - c.cx, py - c.cy); }

    function onWheelDown(e) {
      // ignore the very center (that's the SELECT button, handled separately)
      const c = wheelCenter();
      const p = (e.touches ? e.touches[0] : e);
      const dist = distFrom(p.clientX, p.clientY, c);
      if (dist < c.rad * 0.34) return; // inside the center button → let it click
      powerOn();
      wheelActive = true;
      rotated = false;
      lastAngle = angleFrom(p.clientX, p.clientY, c);
      accum = 0;
      // don't preventDefault yet — we may turn out to be a tap on a label
    }
    function onWheelMove(e) {
      if (!wheelActive) return;
      const c = wheelCenter();
      const p = (e.touches ? e.touches[0] : e);
      const a = angleFrom(p.clientX, p.clientY, c);
      let d = a - lastAngle;
      if (d >  Math.PI) d -= 2 * Math.PI;
      if (d < -Math.PI) d += 2 * Math.PI;
      accum += d;
      const TICK = (22 * Math.PI) / 180; // ~one notch per 22° of rotation
      let moved = false;
      while (accum > TICK)  { moveSelection(+1); accum -= TICK; moved = true; }
      while (accum < -TICK) { moveSelection(-1); accum += TICK; moved = true; }
      if (moved) rotated = true;
      lastAngle = a;
      if (rotated && e.cancelable) e.preventDefault();
    }
    function onWheelUp() {
      wheelActive = false;
      // If we rotated, swallow the click that the browser fires next so a
      // scrub doesn't also activate a label/center button.
      if (rotated) {
        const swallow = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        wheel.addEventListener("click", swallow, { capture: true, once: true });
        setTimeout(() => wheel.removeEventListener("click", swallow, { capture: true }), 0);
      }
    }
    wheel.addEventListener("mousedown", onWheelDown);
    window.addEventListener("mousemove", onWheelMove);
    window.addEventListener("mouseup", onWheelUp);
    wheel.addEventListener("touchstart", onWheelDown, { passive: true });
    window.addEventListener("touchmove",  onWheelMove, { passive: false });
    window.addEventListener("touchend",   onWheelUp);

    function moveSelection(dir) {
      const s = current();
      if (!s) return;
      let n;
      if (s.kind === "menu")            n = s.items.length;
      else if (s.kind === "settings")   n = s.rows.length;
      else if (s.kind === "nowplaying") {
        if (audio.src) audio.currentTime = Math.max(0, Math.min((audio.duration || 0), audio.currentTime + dir * 5));
        else simT = Math.max(0, Math.min(TRACKS[state.nowPlayingIdx].duration, simT + dir * 5));
        renderNowPlaying();
        return;
      }
      if (!n) return;
      s.sel = (s.sel + dir + n) % n;
      if (s.kind === "menu") render();
      else if (s.kind === "settings") render();
    }

    btnCenter.addEventListener("click", () => {
      powerOn();
      const s = current();
      if (!s) return;
      if (s.kind === "menu") { const it = s.items[s.sel]; if (it && it.action) it.action(); }
      else if (s.kind === "settings") selectInSettings();
      else if (s.kind === "nowplaying") togglePlay();
    });
    btnMenu.addEventListener("click",  () => { powerOn(); pop(); });
    btnPrev.addEventListener("click",  () => { powerOn(); prevTrack(); });
    btnNext.addEventListener("click",  () => { powerOn(); nextTrack(); });
    btnPlay.addEventListener("click",  () => { powerOn(); togglePlay(); });

    return { powerOn, pause };
  }



})();


// =============================================================
// PORTED Space Invaders game (from about_14.html), adapted to the
// prototype overlay. Self-contained IIFE; talks to the prototype via
// window.__invadersReset() and window.__invadersOutcome(outcome).
// =============================================================
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const statusEl = document.getElementById('status-text');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const skipLink = document.getElementById('skipLink');
  const viewMappingBtn = null;

  const css = getComputedStyle(document.documentElement);
  const COL = {
    bg:    css.getPropertyValue('--game-bg').trim() || '#f0f0ee',
    text:  css.getPropertyValue('--text').trim() || 'rgb(43, 23, 3)',
  };

  const PALETTE = [
    '#FF3D7F', '#3DC861', '#FFD23F', '#3DDBD9',
    '#A55EEA', '#FF5A5A', '#FF8C42', '#00B8D9',
  ];
  const LASER_PLAYER = '#FF3D7F';
  const LASER_ENEMY  = '#A55EEA';

  let state = 'menu';
  let score = 0, lives = 3;
  let keys = {};
  let lastShot = 0;
  let animFrame = 0;
  let animTimer = 0;

  const player = { x: W/2 - 24, y: H - 48, w: 48, h: 30, speed: 6 };
  let bullets = [];
  let enemyBullets = [];
  let invaders = [];
  let invaderDir = 1;
  let invaderSpeed = 0.55;
  let particles = [];

  const ROWS = 5, COLS = 11;
  const INV_W = 34, INV_H = 22, GAP_X = 14, GAP_Y = 12;

  function createInvaders() {
    invaders = [];
    const startX = (W - (COLS * (INV_W + GAP_X) - GAP_X)) / 2;
    const startY = 50;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
        const sprite = Math.floor(Math.random() * 3);
        invaders.push({
          x: startX + c * (INV_W + GAP_X),
          y: startY + r * (INV_H + GAP_Y),
          w: INV_W, h: INV_H,
          alive: true,
          color, sprite,
          row: r, col: c,
          points: 10 + sprite * 10
        });
      }
    }
    invaderDir = 1;
    invaderSpeed = 0.55;
  }

  function reset(full) {
    if (full) { score = 0; lives = 3; }
    bullets = []; enemyBullets = []; particles = [];
    player.x = W/2 - player.w/2;
    createInvaders();
    updateHUD();
  }

  function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    const map = { playing:'engaged', paused:'paused', won:'victory', gameover:'defeated', menu:'ready' };
    statusEl.textContent = map[state] || 'ready';
  }

  // In the spatial prototype the invaders game is a self-contained overlay.
  // On win/lose/skip we surface the outcome, then let the prototype close it.
  function unlockContent(opts) {
    const outcome = (opts && opts.outcome) || 'skip';
    if (typeof window.__invadersOutcome === 'function') {
      window.__invadersOutcome(outcome);
    }
  }
  window.__unlock = unlockContent;

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 2.5;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 22 + Math.random()*14, color });
    }
  }
  function rectsHit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function update() {
    if (state !== 'playing') return;
    animTimer++;
    if (animTimer % 22 === 0) animFrame = 1 - animFrame;

    if (keys['ArrowLeft']  || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    player.x = Math.max(10, Math.min(W - player.w - 10, player.x));

    if (keys[' '] || keys['Spacebar']) {
      const now = Date.now();
      if (now - lastShot > 320) {
        bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 12, vy: -8 });
        lastShot = now;
      }
    }

    bullets.forEach(b => b.y += b.vy);
    bullets = bullets.filter(b => b.y > -20);
    enemyBullets.forEach(b => b.y += b.vy);
    enemyBullets = enemyBullets.filter(b => b.y < H + 20);

    const alive = invaders.filter(i => i.alive);
    if (alive.length === 0) {
      state = 'won';
      updateHUD();
      setTimeout(() => unlockContent({ outcome: 'won' }), 900);
      return;
    }

    const speedMul = 1 + (1 - alive.length / (ROWS * COLS)) * 2.2;
    let edgeHit = false;
    alive.forEach(inv => {
      inv.x += invaderDir * invaderSpeed * speedMul;
      if (inv.x < 10 || inv.x + inv.w > W - 10) edgeHit = true;
    });
    if (edgeHit) {
      invaderDir *= -1;
      alive.forEach(inv => inv.y += 18);
    }

    if (Math.random() < 0.028) {
      const cols = {};
      alive.forEach(inv => {
        if (!cols[inv.col] || inv.y > cols[inv.col].y) cols[inv.col] = inv;
      });
      const shooters = Object.values(cols);
      if (shooters.length) {
        const s = shooters[Math.floor(Math.random() * shooters.length)];
        enemyBullets.push({ x: s.x + s.w/2 - 2, y: s.y + s.h, w: 4, h: 10, vy: 3.6 });
      }
    }

    bullets.forEach(b => {
      alive.forEach(inv => {
        if (rectsHit(b, inv)) {
          inv.alive = false;
          b.y = -100;
          score += inv.points;
          spawnParticles(inv.x + inv.w/2, inv.y + inv.h/2, inv.color);
          updateHUD();
        }
      });
    });
    bullets = bullets.filter(b => b.y > -20);

    enemyBullets.forEach(b => {
      if (rectsHit(b, player)) {
        b.y = H + 100;
        lives--;
        spawnParticles(player.x + player.w/2, player.y + player.h/2, LASER_ENEMY);
        updateHUD();
        if (lives <= 0) {
          state = 'gameover';
          updateHUD();
          setTimeout(() => unlockContent({ outcome: 'lost' }), 900);
        }
      }
    });
    enemyBullets = enemyBullets.filter(b => b.y < H + 20);

    if (alive.some(inv => inv.y + inv.h >= player.y)) {
      state = 'gameover';
      updateHUD();
      setTimeout(() => unlockContent({ outcome: 'lost' }), 900);
    }

    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
    particles = particles.filter(p => p.life > 0);
  }

  function drawInvader(inv) {
    const x = inv.x, y = inv.y, w = inv.w, h = inv.h;
    ctx.fillStyle = inv.color;
    const px = w / 8, py = h / 6;
    if (inv.sprite === 0) {
      ctx.fillRect(x + px*2, y + py,   px*4, py);
      ctx.fillRect(x + px,   y + py*2, px*6, py);
      ctx.fillRect(x,        y + py*3, px*8, py);
      ctx.fillRect(x,        y + py*4, px*2, py);
      ctx.fillRect(x + px*3, y + py*4, px*2, py);
      ctx.fillRect(x + px*6, y + py*4, px*2, py);
      if (animFrame === 0) { ctx.fillRect(x + px, y + py*5, px, py); ctx.fillRect(x + px*6, y + py*5, px, py); }
      else { ctx.fillRect(x, y + py*5, px, py); ctx.fillRect(x + px*7, y + py*5, px, py); }
      ctx.fillStyle = COL.bg;
      ctx.fillRect(x + px*2, y + py*3, px, py); ctx.fillRect(x + px*5, y + py*3, px, py);
    } else if (inv.sprite === 1) {
      ctx.fillRect(x + px*3, y,        px*2, py);
      ctx.fillRect(x + px*2, y + py,   px*4, py);
      ctx.fillRect(x + px,   y + py*2, px*6, py);
      ctx.fillRect(x,        y + py*3, px*8, py);
      ctx.fillRect(x + px,   y + py*4, px*2, py);
      ctx.fillRect(x + px*5, y + py*4, px*2, py);
      if (animFrame === 0) { ctx.fillRect(x, y + py*5, px, py); ctx.fillRect(x + px*3, y + py*5, px*2, py); ctx.fillRect(x + px*7, y + py*5, px, py); }
      else { ctx.fillRect(x + px*2, y + py*5, px, py); ctx.fillRect(x + px*5, y + py*5, px, py); }
      ctx.fillStyle = COL.bg;
      ctx.fillRect(x + px*2, y + py*3, px, py); ctx.fillRect(x + px*5, y + py*3, px, py);
    } else {
      ctx.fillRect(x + px*2, y,        px*4, py);
      ctx.fillRect(x + px,   y + py,   px*6, py);
      ctx.fillRect(x,        y + py*2, px*8, py);
      ctx.fillRect(x,        y + py*3, px*8, py);
      ctx.fillRect(x,        y + py*4, px*2, py);
      ctx.fillRect(x + px*3, y + py*4, px*2, py);
      ctx.fillRect(x + px*6, y + py*4, px*2, py);
      if (animFrame === 0) { ctx.fillRect(x, y + py*5, px, py); ctx.fillRect(x + px*3, y + py*5, px*2, py); ctx.fillRect(x + px*7, y + py*5, px, py); }
      else { ctx.fillRect(x + px, y + py*5, px, py); ctx.fillRect(x + px*4, y + py*5, px, py); ctx.fillRect(x + px*6, y + py*5, px, py); }
      ctx.fillStyle = COL.bg;
      ctx.fillRect(x + px*2, y + py*2, px, py); ctx.fillRect(x + px*5, y + py*2, px, py);
    }
  }

  function drawPlayer() {
    const x = player.x, y = player.y, w = player.w, h = player.h;
    const u = w / 12;
    ctx.fillStyle = COL.text;
    ctx.fillRect(x + u*5,  y,        u*2, u);
    ctx.fillRect(x + u*5,  y + u,    u*2, u);
    ctx.fillRect(x + u*4,  y + u*2,  u*4, u);
    ctx.fillRect(x + u*4,  y + u*3,  u*4, u);
    ctx.fillRect(x + u*2,  y + u*4,  u*8, u);
    ctx.fillRect(x,        y + u*4,  u*2, u*2);
    ctx.fillRect(x + u*10, y + u*4,  u*2, u*2);
    ctx.fillRect(x + u*3,  y + u*5,  u*2, u*2);
    ctx.fillRect(x + u*7,  y + u*5,  u*2, u*2);
    ctx.fillRect(x + u*5,  y + u*5,  u*2, u*2);
  }

  function draw() {
    ctx.fillStyle = COL.bg;
    ctx.fillRect(0, 0, W, H);
    invaders.forEach(inv => { if (inv.alive) drawInvader(inv); });
    drawPlayer();
    ctx.fillStyle = LASER_PLAYER;
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
    ctx.fillStyle = LASER_ENEMY;
    enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.min(1, p.life / 28);
      ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
    if (state === 'menu')          drawOverlay('space invaders', 'press start to begin');
    else if (state === 'paused')   drawOverlay('paused', 'press p to resume');
    else if (state === 'gameover') drawOverlay('defeated', 'press start to try again');
    else if (state === 'won')      drawOverlay('victory', 'unlocking the space...');
  }

  function drawOverlay(title, sub) {
    ctx.fillStyle = 'rgba(240, 240, 238, 0.88)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COL.text;
    ctx.font = '500 30px "Instrument Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, W/2, H/2 - 6);
    ctx.font = '14px "Instrument Sans", sans-serif';
    ctx.fillStyle = 'rgba(43, 23, 3, 0.55)';
    ctx.fillText(sub, W/2, H/2 + 22);
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }
  function gateInView() {
    const r = canvas.getBoundingClientRect();
    return r.bottom > 0 && r.top < window.innerHeight * 0.7;
  }

  window.addEventListener('keydown', e => {
    if (!gateInView()) return;
    if (['ArrowLeft', 'ArrowRight', ' ', 'Spacebar'].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    if (e.key === 'p' || e.key === 'P') {
      if (state === 'playing') { state = 'paused'; updateHUD(); }
      else if (state === 'paused') { state = 'playing'; updateHUD(); }
    }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  startBtn.addEventListener('click', () => {
    if (state === 'menu' || state === 'gameover' || state === 'won') {
      reset(true); state = 'playing'; updateHUD();
    }
  });
  resetBtn.addEventListener('click', () => { reset(true); state = 'menu'; updateHUD(); });
  if (skipLink) skipLink.addEventListener('click', e => { e.preventDefault(); unlockContent({ outcome: 'skip' }); });
  if (viewMappingBtn) {
    viewMappingBtn.addEventListener('click', () => {
      unlockContent({ outcome: 'skip' });
    });
  }

  reset(true); state = 'menu'; updateHUD(); loop();

  // Expose a way for the spatial code to reset the game when re-opening the invaders artifact
  window.__invadersReset = function() { reset(true); state = 'menu'; updateHUD(); };
})();

/* =========================================================
   MOBILE NAV TOGGLE — [+] pill opens/closes the overlay menu
   ========================================================= */
(function() {
  'use strict';
  const header = document.querySelector('.header_wrapper');
  const menuToggle = document.querySelector('[data-mobile-toggle]');
  if (menuToggle && header) {
    menuToggle.addEventListener('click', e => {
      if (!window.matchMedia('(max-width: 720px)').matches) return;
      e.preventDefault();
      const open = header.classList.toggle('menu-open');
      menuToggle.setAttribute('aria-expanded', open);
    });
  }
  document.addEventListener('click', e => {
    if (!window.matchMedia('(max-width: 720px)').matches) return;
    if (!header || !header.classList.contains('menu-open')) return;
    if (header.contains(e.target)) return;
    header.classList.remove('menu-open');
    if (menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
  });
  document.querySelectorAll('.nav-pill').forEach(p => {
    p.addEventListener('click', () => {
      if (!window.matchMedia('(max-width: 720px)').matches) return;
      if (p === menuToggle) return;
      if (header) header.classList.remove('menu-open');
      if (menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
    });
  });
})();

<!-- =========================================================
     ROCK ANCHOR — Three.js visual layer (additive only)
     Loads a real 3D rock (rock.glb, optimized) into the
     existing .anchor element. The .anchor keeps every existing
     listener and stays the functional open/close trigger.
       • The flat WebGL plane is BILLBOARDED every frame (same
         counter-rotation the pills use) so it never turns
         edge-on / disappears and stays clickable.
       • The universe's live rotation is fed into the rock, so
         dragging genuinely orbits it in true 3D.
     three.min.js + gltfloader.js + rock.glb are all vendored
     locally — no CDN. If anything fails to load, the original
     pill anchor is left fully intact.
     ========================================================= -->
<script src="./three.min.js"></script>
<script src="./gltfloader.js"></script>
<script>
(function () {
  'use strict';

  function init() {
    var THREE = window.THREE;
    var anchorEl   = document.querySelector('.universe .anchor');
    var universeEl = document.getElementById('universe');
    if (!THREE || !THREE.GLTFLoader || !anchorEl || !universeEl) return;  // fallback → pill

    var canvas = document.createElement('canvas');
    canvas.className = 'anchor-canvas';
    canvas.style.opacity = '0';
    canvas.style.transition = 'opacity 600ms ease';

    var renderer;
    try { renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true }); }
    catch (e) { return; }
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    if (THREE.sRGBEncoding) renderer.outputEncoding = THREE.sRGBEncoding;
    if (THREE.ACESFilmicToneMapping) { renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.04; }

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
    camera.position.set(0, 0.2, 4.6);
    camera.lookAt(0, 0, 0);

    // ---- procedural studio environment (image-based lighting) -------------
    function makeEnvTexture() {
      var c = document.createElement('canvas'); c.width = 512; c.height = 256;
      var g = c.getContext('2d');
      var grad = g.createLinearGradient(0, 0, 0, 256);
      grad.addColorStop(0.0, '#ffffff'); grad.addColorStop(0.5, '#ece6dc');
      grad.addColorStop(0.7, '#cfc7b8'); grad.addColorStop(1.0, '#6f6657');
      g.fillStyle = grad; g.fillRect(0, 0, 512, 256);
      var hl = g.createRadialGradient(160, 64, 6, 160, 64, 130);
      hl.addColorStop(0, 'rgba(255,255,255,0.95)'); hl.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = hl; g.fillRect(0, 0, 512, 256);
      var t = new THREE.CanvasTexture(c);
      t.mapping = THREE.EquirectangularReflectionMapping;
      if (THREE.sRGBEncoding) t.encoding = THREE.sRGBEncoding;
      t.needsUpdate = true; return t;
    }
    var envTex = makeEnvTexture();
    try { var pm = new THREE.PMREMGenerator(renderer); pm.compileEquirectangularShader();
          scene.environment = pm.fromEquirectangular(envTex).texture; envTex.dispose(); pm.dispose(); }
    catch (e) { scene.environment = envTex; }

    // uni = universe-coupled orientation · obj = idle spin + resting tilt
    var uni = new THREE.Group(), obj = new THREE.Group();
    uni.add(obj); scene.add(uni);
    var BASE_TILT = -0.12;

    // ---- lights -----------------------------------------------------------
    var ambient = new THREE.AmbientLight(0xffffff, 0.5);
    var key  = new THREE.DirectionalLight(0xfff2e2, 1.35); key.position.set(-3, 5, 3.6);
    var rim  = new THREE.DirectionalLight(0xffffff, 0.8);  rim.position.set(2.4, 3, -5);
    var fill = new THREE.DirectionalLight(0xdce6f2, 0.18); fill.position.set(3.6, -2.4, 1.6);
    scene.add(ambient, key, rim, fill);

    // ---- BENJAMIN — clean billboarded wordmark (placeholder) --------------
    function bakeText(mode) {
      var c = document.createElement('canvas'); c.width = 1024; c.height = 256;
      var g = c.getContext('2d'); g.clearRect(0,0,1024,256);
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.font = '600 92px "Instrument Sans", system-ui, sans-serif';
      var word='BENJAMIN', ls=12, Wd=[], tot=0, k;
      for(k=0;k<word.length;k++){var w=g.measureText(word[k]).width; Wd.push(w); tot+=w+ls;} tot-=ls;
      function draw(){var x=(1024-tot)/2; for(var j=0;j<word.length;j++){g.fillText(word[j], x+Wd[j]/2, 130); x+=Wd[j]+ls;}}
      if (mode==='lit'){ g.shadowColor='rgba(255,246,228,0.95)'; g.shadowBlur=22; g.fillStyle='#fff8ec'; draw(); draw(); }
      else { g.shadowColor='rgba(0,0,0,0.25)'; g.shadowBlur=4; g.fillStyle='rgba(245,242,236,0.92)'; draw(); }
      var t=new THREE.CanvasTexture(c); t.minFilter=THREE.LinearFilter; t.anisotropy=4; t.needsUpdate=true; return t;
    }
    var quietMat = new THREE.MeshBasicMaterial({ map: bakeText('quiet'), transparent:true, opacity:0, depthWrite:false, depthTest:false });
    var litMat   = new THREE.MeshBasicMaterial({ map: bakeText('lit'),   transparent:true, opacity:0, depthWrite:false, depthTest:false });
    var labelGeo = new THREE.PlaneGeometry(1.5, 0.375);
    var labelQuiet = new THREE.Mesh(labelGeo, quietMat);
    var labelLit   = new THREE.Mesh(labelGeo, litMat);
    var label = new THREE.Group(); label.add(labelQuiet); label.add(labelLit);
    label.position.set(0, 0, 1.25);     // floats just in front of the rock, always camera-facing
    scene.add(label);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(function(){ quietMat.map=bakeText('quiet'); quietMat.needsUpdate=true; litMat.map=bakeText('lit'); litMat.needsUpdate=true; }).catch(function(){});

    // ---- observed state ---------------------------------------------------
    var hoverT=0, hover=0;
    var activeT = universeEl.classList.contains('is-shifted') ? 1 : 0, active = activeT;
    anchorEl.addEventListener('mouseenter', function(){ hoverT=1; });
    anchorEl.addEventListener('mouseleave', function(){ hoverT=0; });
    new MutationObserver(function(){
      var open = universeEl.classList.contains('is-shifted');
      activeT = open ? 1 : 0; anchorEl.classList.toggle('is-active', open);
    }).observe(universeEl, { attributes:true, attributeFilter:['class'] });

    // ---- sizing -----------------------------------------------------------
    function resize() {
      var w = canvas.clientWidth, h = canvas.clientHeight;
      if (!w || !h) { var s=(anchorEl.clientWidth||130)*1.28; w=s; h=s; }
      renderer.setSize(w, h, false); camera.aspect=w/h; camera.updateProjectionMatrix();
    }
    if (window.ResizeObserver) new ResizeObserver(resize).observe(anchorEl);
    else window.addEventListener('resize', resize);

    // read universe rotation straight from its inline transform
    var reX=/rotateX\(([-0-9.]+)deg\)/, reY=/rotateY\(([-0-9.]+)deg\)/;
    function uniAngles(){ var t=universeEl.style.transform||''; var mx=t.match(reX),my=t.match(reY);
      return { rx: mx?parseFloat(mx[1]):0, ry: my?parseFloat(my[1]):0 }; }

    // ---- load the rock, then start ----------------------------------------
    var rockMats = [], started = false, spin = 0, last = performance.now(), running = true, DEG = Math.PI/180;
    function lerp(a,b,t){ return a+(b-a)*t; }

    new THREE.GLTFLoader().load('./rock.glb', function (gltf) {
      var rock = gltf.scene;
      obj.add(rock);
      // normalize: fit to unit-ish size and recenter at origin
      var box = new THREE.Box3().setFromObject(rock), size = new THREE.Vector3(), ctr = new THREE.Vector3();
      box.getSize(size);
      var kfit = 1.85 / Math.max(size.x, size.y, size.z);
      rock.scale.setScalar(kfit);
      box.setFromObject(rock); box.getCenter(ctr); rock.position.sub(ctr);
      // collect materials (for the active "powered-on" warmth) + tune env
      rock.traverse(function (o) {
        if (o.isMesh && o.material) {
          var mm = Array.isArray(o.material) ? o.material : [o.material];
          mm.forEach(function (m) {
            if ('envMapIntensity' in m) m.envMapIntensity = 1.15;
            if ('emissive' in m) { m.emissive = new THREE.Color(0x6e3d12); m.emissiveIntensity = 0; }
            rockMats.push(m);
          });
        }
      });
      anchorEl.classList.add('has-3d');
      anchorEl.appendChild(canvas);
      if (activeT) anchorEl.classList.add('is-active');
      resize();
      renderer.render(scene, camera);
      requestAnimationFrame(function(){ canvas.style.opacity = '1'; });
      started = true;
      requestAnimationFrame(frame);
    }, undefined, function (err) {
      // load failed → leave the original pill anchor untouched
    });

    function frame(now) {
      requestAnimationFrame(frame);
      if (!running || !started) { last = now; return; }
      var dt = Math.min((now-last)/1000, 0.05); last = now;
      hover  = lerp(hover,  hoverT,  1-Math.pow(0.0009,dt));
      active = lerp(active, activeT, 1-Math.pow(0.004, dt));

      var a = uniAngles();
      // billboard the plane so it never goes edge-on / disappears
      anchorEl.style.transform = 'translate(-50%, -50%) rotateY(' + (-a.ry).toFixed(2) + 'deg) rotateX(' + (-a.rx).toFixed(2) + 'deg)';

      // feed the universe rotation into the rock (true 3D orbit); ease toward a
      // calm settle when a panel is open (active)
      var couple = 1 - active;
      uni.rotation.set(0,0,0);
      uni.rotateX(a.rx*DEG*couple);
      uni.rotateY(a.ry*DEG*couple);

      spin += dt * 0.3 * couple;                  // gentle idle turntable (jagged form makes it read)
      obj.rotation.set(BASE_TILT, spin, 0);

      uni.scale.setScalar(1 + hover*0.05 + active*0.025);

      key.intensity = 1.35 + hover*0.3 + active*0.25;
      rim.intensity = 0.80 + hover*0.15 + active*0.3;
      ambient.intensity = 0.5 + active*0.08;
      for (var i=0;i<rockMats.length;i++){
        var m = rockMats[i];
        if ('emissiveIntensity' in m) m.emissiveIntensity = active*0.32 + hover*0.08;
        if ('envMapIntensity' in m) m.envMapIntensity = 1.15 + hover*0.2 + active*0.2;
      }

      // BENJAMIN label: always face camera; quiet when dormant, lit when active
      label.quaternion.copy(camera.quaternion);
      quietMat.opacity = (1-active) * (0.16 + hover*0.34);
      litMat.opacity   = active * (0.85 + 0.15) + hover*0.0;

      renderer.render(scene, camera);
    }
    document.addEventListener('visibilitychange', function(){ running=!document.hidden; });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
