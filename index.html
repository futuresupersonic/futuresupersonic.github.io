<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>benjamin lemar — conceptual designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   TOKENS — inherited from about.html to keep this in-family
   ========================================================= */
:root {
  --radius: 45px;
  --bg: #f6f6f6;
  --bg-soft: #efeeec;
  --ink: rgb(43, 23, 3);
  --ink-soft: rgba(43, 23, 3, 0.66);
  --ink-faint: rgba(43, 23, 3, 0.35);
  --ink-ghost: rgba(43, 23, 3, 0.14);
  --lime: #b7ff00;
  --fs: clamp(13px, 1.2vw, 14px);
  --ls: -0.005em;
  --ease-spatial: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-morph:   cubic-bezier(0.55, 0.06, 0.18, 1);
  --ease-gooey:   cubic-bezier(0.34, 1.18, 0.5, 1);   /* slight overshoot — the gooey */
  --pill-h: 36px;
  --pill-pad: 14px;

  /* --- tokens needed by ported about_14 artifacts (iPod + Invaders) --- */
  --game-bg: #f0f0ee;
  --game-border: rgba(43, 23, 3, 0.12);
  --card-radius: 18px;

  /* --- Nav system (from about_14 / index) — aliases onto the existing palette --- */
  --text: var(--ink);
  --text-soft: var(--ink-soft);
  --text-faint: var(--ink-faint);
  --accent: var(--lime);
  --pill-bg: #eeeeee;
  --pill-bg-hover: #e4e4e4;
  --gutter: 30px;
  --content-max: 1332px;
  --nav-gap: 11px;
  --nav-h: 25px;
  --nav-fs: clamp(12px, 2vw, 12.6px);
  --ease-1: cubic-bezier(0.33, 0, 0, 1);

  /* nav pill widths — 3-pill layout */
  --nav-home:        49.55%;   /* 660px — matched to practice.html */
  --nav-practice:    24.40%;   /* 325px — matched to practice.html */
  --nav-fss:         24.40%;   /* 325px — matched to practice.html */
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Instrument Sans", -apple-system, system-ui, sans-serif;
  font-size: var(--fs);
  letter-spacing: var(--ls);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  scrollbar-gutter: stable;
  user-select: none;
  -webkit-user-select: none;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

/* =========================================================
   FRAME
   ========================================================= */
.frame {
  position: fixed;
  inset: 0;
}

/* =========================================================
   HEADER / NAV — preserved from about_14.html
   ========================================================= */
.header_wrapper {
  position: fixed;
  top: 12px;
  padding: 30px 0;
  min-height: 86px;
  box-sizing: border-box;
  left: 0; right: 0;
  z-index: 100;
  background: transparent;
  transition: transform 250ms var(--ease-1);
  /* The header is a fixed, full-width, transparent band sitting at z-index 100.
     Its empty regions were swallowing pointer events meant for controls beneath
     it (notably the card-stack close button at top:56px). Make the band itself
     transparent to the pointer and re-enable only the actual nav pills. */
  pointer-events: none;
}
.header_wrapper .nav-pill,
.header_wrapper .nav-pill * { pointer-events: auto; }
.header_wrapper .container {
  width: 100%;
  max-width: calc(var(--content-max) + var(--gutter) * 2);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.nav-row {
  display: flex;
  gap: var(--nav-gap);
  width: 100%;
}
.nav-pill {
  border-radius: var(--radius);
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  height: var(--nav-h);
  padding: 0 10px;
  background: var(--pill-bg);
  color: var(--text);
  font-size: var(--nav-fs);
  line-height: 1;
  letter-spacing: var(--ls);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: background 120ms var(--ease-1), color 200ms var(--ease-1), opacity 200ms var(--ease-1);
  width: auto;
  flex: 0 0 auto;
  position: relative;
}
.nav-pill:hover { background: var(--accent); }
.nav-pill.is-active { background: var(--accent); }
.nav-pill.home { overflow: hidden; text-overflow: ellipsis; }
.nav-pill.home            { width: var(--nav-home); }
.nav-pill.nav-practice    { width: var(--nav-practice); }
.nav-pill.nav-fss         { width: var(--nav-fss); }
.nav-pill.nav-menu-toggle { display: none; }
.nav-pill.home .name-full  { display: inline; }
.nav-pill.home .name-short { display: none; }

/* Locked pills (pages not built yet) — greyed with a status dot */
.nav-pill.is-locked {
  /* visually identical to active pills, but does not navigate to a page
     that doesn't exist yet. Hover feedback is kept so they feel interactive. */
  cursor: pointer;
}

/* =========================================================
   STAGE — the 3D viewport
   ========================================================= */
.stage {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  perspective: 1300px;
  perspective-origin: 50% 50%;
  cursor: grab;
  background:
    radial-gradient(circle at 50% 48%, transparent 0%, rgba(43,23,3,0.04) 80%, rgba(43,23,3,0.10) 100%),
    var(--bg);
}
.stage.is-dragging { cursor: grabbing; }

/* The universe is the rotatable container. preserve-3d keeps children in 3D. */
.universe {
  position: absolute;
  top: 50%;
  left: var(--universe-x, 50%);
  width: 0; height: 0;
  transform-style: preserve-3d;
  /* will-change deliberately omitted on transform here — we want compositor to render
     children in 3D each frame as the parent rotates */
  will-change: transform, left;
  transform: translate(-50%, -50%) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
  transition: transform 240ms var(--ease-spatial), left 700ms var(--ease-morph);
}
.universe.is-dragging { transition: left 700ms var(--ease-morph); }
.universe.is-resting  { transition: transform 1400ms var(--ease-spatial), left 700ms var(--ease-morph); }
/* When content cards open, slide the constellation left so it sits beside them */
.universe.is-shifted { --universe-x: 31%; }

/* The center anchor — the user's avatar / "you are here" */
.anchor {
  position: absolute;
  top: 50%; left: 50%;
  height: 40px;
  line-height: 40px;
  padding: 0 22px;
  margin: 0;
  transform: translate(-50%, -50%) translateZ(0);
  border-radius: 20px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-style: preserve-3d;
  z-index: 2;
  transition: box-shadow 300ms var(--ease-spatial);
  /* brighter, warmer frosted pill — the "you are here" */
  background:
    linear-gradient(180deg,
      rgba(255,255,255,1) 0%,
      rgba(255,253,245,0.85) 45%,
      rgba(250,247,235,0.78) 100%);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  box-shadow:
    0 18px 40px rgba(43,23,3,0.10),
    0 4px 12px rgba(43,23,3,0.07),
    inset 0 1px 1px rgba(255,255,255,1),
    inset 0 -2px 3px rgba(43,23,3,0.05);
}
.anchor:hover {
  box-shadow:
    0 22px 50px rgba(43,23,3,0.14),
    0 6px 16px rgba(43,23,3,0.09),
    inset 0 1px 1px rgba(255,255,255,1),
    inset 0 -2px 3px rgba(43,23,3,0.05),
    0 0 0 3px rgba(183,255,0,0.45);
}
.anchor .you {
  font-family: "Instrument Sans", sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  text-transform: none;
  color: var(--ink);
}
.anchor::after {
  /* a soft halo behind the anchor, sells the depth + warmth */
  content: "";
  position: absolute;
  inset: -36px -28px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(183,255,0,0.10) 0%, transparent 70%);
  transform: translateZ(-2px);
  pointer-events: none;
}

/* =========================================================
   3D ROCK ANCHOR — additive visual layer.
   These rules only take effect once JS confirms Three.js
   loaded and adds `.has-3d`. If it fails, the original
   frosted-pill anchor above is left fully intact.
   The original .anchor element remains the functional
   trigger; the <canvas> child is pointer-events:none.
   ========================================================= */
.anchor.has-3d {
  width: 140px;
  height: 140px;
  padding: 0;
  line-height: normal;
  border-radius: 50%;
  transform-origin: center center;
  background: none;
  -webkit-backdrop-filter: none;
  backdrop-filter: none;
  box-shadow: none;
  overflow: visible;
  cursor: pointer;
}
.anchor.has-3d:hover { box-shadow: none; }
.anchor.has-3d .you { display: none; }
.anchor.has-3d::after {
  /* soft warm contact shadow grounding the pebble — replaces the lime halo */
  inset: auto;
  left: 50%;
  bottom: 14px;
  width: 58%;
  height: 22px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(43,23,3,0.22) 0%, rgba(43,23,3,0.09) 48%, transparent 74%);
  transform: translateX(-50%) translateZ(-10px);
  filter: blur(6px);
  opacity: 0.8;
  transition: opacity 700ms var(--ease-spatial), width 700ms var(--ease-spatial);
  z-index: -1;
}
.anchor.has-3d:hover::after { opacity: 0.95; width: 60%; }
.anchor.has-3d.is-active::after {
  opacity: 1; width: 66%; height: 26px;
  background: radial-gradient(ellipse at center,
    rgba(196,150,40,0.30) 0%, rgba(120,86,20,0.12) 46%, transparent 74%);
}
.anchor-canvas {
  position: absolute;
  inset: -14%;                 /* bleed past the box so soft edges + rim aren't clipped */
  width: 128%;
  height: 128%;
  display: block;
  pointer-events: none;        /* let the .anchor element keep every listener */
  -webkit-user-select: none;
  user-select: none;
}

/* A pill is one node on the sphere.
   We use a TWO-LAYER structure so the OUTER layer can be positioned in 3D
   (and rotated by the universe), while the INNER layer counter-rotates to
   billboard toward the camera. That makes text always face the viewer. */
.pill {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  /* x, y, z set per-element by JS via CSS variables */
  transform: translate3d(var(--x, 0px), var(--y, 0px), var(--z, 0px));
  transform-style: preserve-3d;
  transition: transform 650ms var(--ease-gooey);
}
.pill .face {
  /* The visible pill content. Counter-rotates to stay flat-facing.
     Style: soft frosted lozenge — translucent milky fill, diffuse shadow,
     top inner-light, no hard border. */
  position: absolute;
  top: 50%; left: 50%;
  height: var(--pill-h);
  line-height: var(--pill-h);
  padding: 0 calc(var(--pill-pad) + 4px);
  border: none;
  border-radius: calc(var(--pill-h) / 2);
  font-family: "Instrument Sans", sans-serif;
  font-size: 12.5px;
  letter-spacing: 0.01em;
  color: rgba(43, 23, 3, 0.82);
  white-space: nowrap;
  cursor: pointer;
  transform-origin: center center;
  transform: translate(-50%, -50%) rotateY(var(--cy, 0deg)) rotateX(var(--cx, 0deg));

  /* Frosted translucent fill: a soft vertical gradient + a subtle blur of
     whatever is behind it. The inset highlight on top + inset shadow on the
     bottom give it the rounded-glass, top-lit read. */
  background:
    linear-gradient(180deg,
      rgba(255,255,255,0.92) 0%,
      rgba(255,255,255,0.62) 45%,
      rgba(240,238,236,0.50) 100%);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);

  box-shadow:
    /* big diffuse hover-shadow — strength scales with depth via the vars */
    0 calc(6px + var(--depth-shadow, 0px)) calc(20px + var(--depth-shadow-blur, 6px)) rgba(43,23,3, var(--depth-shadow-a, 0.05)),
    0 2px 6px rgba(43,23,3, calc(var(--depth-shadow-a, 0.05) * 0.6)),
    /* top inner highlight — light catching the rounded top edge */
    inset 0 1px 1px rgba(255,255,255,0.9),
    /* bottom inner shade — gives roundness */
    inset 0 -2px 3px rgba(43,23,3,0.05);

  opacity: var(--depth-opacity, 1);
  filter: blur(var(--depth-blur, 0px));
  backface-visibility: hidden;

  transition:
    transform 240ms var(--ease-spatial),
    background 360ms var(--ease-spatial),
    color 320ms var(--ease-spatial),
    box-shadow 360ms var(--ease-spatial);
}
.pill .face:hover {
  color: var(--ink);
  background:
    linear-gradient(180deg,
      rgba(255,255,255,0.98) 0%,
      rgba(255,255,255,0.78) 45%,
      rgba(245,243,240,0.66) 100%);
  box-shadow:
    0 calc(12px + var(--depth-shadow, 0px)) calc(30px + var(--depth-shadow-blur, 6px)) rgba(43,23,3, calc(var(--depth-shadow-a, 0.05) + 0.05)),
    0 3px 8px rgba(43,23,3,0.10),
    inset 0 1px 1px rgba(255,255,255,1),
    inset 0 -2px 3px rgba(43,23,3,0.05);
  transform: translate(-50%, -50%) rotateY(var(--cy, 0deg)) rotateX(var(--cx, 0deg)) scale(1.07);
}
.pill.is-near .face {
  /* When a pill is the closest one to the camera, lift it a touch brighter */
  color: var(--ink);
}
.pill.is-active .face {
  color: var(--ink);
  background:
    linear-gradient(180deg,
      rgba(208,255,120,0.95) 0%,
      rgba(183,255,0,0.78) 50%,
      rgba(165,230,0,0.66) 100%);
  box-shadow:
    0 calc(12px + var(--depth-shadow, 0px)) calc(30px + var(--depth-shadow-blur, 6px)) rgba(80,110,0,0.18),
    inset 0 1px 1px rgba(255,255,255,0.7),
    inset 0 -2px 3px rgba(80,110,0,0.10);
}

/* Thin connector lines from anchor to each pill, drawn as a child div. */
.thread {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  pointer-events: none;
  transform: translate3d(0,0,0);
  transform-style: preserve-3d;
  opacity: var(--depth-opacity, 1);
}
/* Thin connector lines from the anchor (origin) to each pill.
   Each line lives inside the universe so it rotates with the whole sphere.
   We anchor it at the origin and orient it toward the pill via a compound
   transform (azimuth around Y, elevation around Z), then give it a length.
   It stops short of both ends so it never visually touches anchor or pill. */
.thread {
  position: absolute;
  top: 0; left: 0;
  width: var(--len, 0px);
  height: 1px;
  transform-origin: 0 50%;
  transform-style: preserve-3d;
  /* azimuth (Y) then elevation (Z), then push out from origin by the start gap */
  transform:
    rotateY(var(--az, 0deg))
    rotateZ(var(--el, 0deg))
    translateX(var(--gap, 26px));
  pointer-events: none;
  z-index: 0;
}
.thread .line {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg,
    rgba(43,23,3, calc(0.10 * var(--thread-a, 1))) 0%,
    rgba(43,23,3, calc(0.16 * var(--thread-a, 1))) 50%,
    rgba(43,23,3, calc(0.06 * var(--thread-a, 1))) 100%);
  opacity: var(--thread-a, 1);
  transform-origin: 0 50%;
  /* grow animation on expand */
  transform: scaleX(var(--thread-grow, 1));
  transition: transform 380ms var(--ease-gooey);
}
/* Child threads start at the parent position, then orient toward the child. */
.thread.is-child-thread {
  transform:
    translate3d(var(--ox, 0px), var(--oy, 0px), var(--oz, 0px))
    rotateY(var(--az, 0deg))
    rotateZ(var(--el, 0deg))
    translateX(var(--gap, 22px));
}
/* Child pills pop in with a scale + fade */
.pill.is-child .face {
  font-size: 11.5px;
  height: 30px;
  line-height: 30px;
  padding: 0 14px;
  background:
    linear-gradient(180deg,
      rgba(255,255,255,0.82) 0%,
      rgba(255,255,255,0.52) 45%,
      rgba(240,238,236,0.42) 100%);
  transform:
    translate(-50%, -50%)
    rotateY(var(--cy, 0deg)) rotateX(var(--cx, 0deg))
    scale(var(--child-scale, 1));
  opacity: calc(var(--depth-opacity, 1) * var(--child-op, 1));
  transition:
    transform 420ms var(--ease-gooey),
    opacity 380ms var(--ease-spatial),
    background 360ms var(--ease-spatial),
    color 320ms var(--ease-spatial),
    box-shadow 360ms var(--ease-spatial);
}
.pill.is-child .face:hover {
  transform:
    translate(-50%, -50%)
    rotateY(var(--cy, 0deg)) rotateX(var(--cx, 0deg))
    scale(calc(var(--child-scale, 1) * 1.08));
}

/* HUD — drag hint at bottom */
.hud {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 18px;
  z-index: 5;
  transition: opacity 600ms var(--ease-spatial);
}
.hud.is-hidden { opacity: 0; }
.hud kbd {
  font-family: inherit;
  font-size: 10px;
  border: 1px solid var(--ink-ghost);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

/* Zoom controls */
.zoomctl {
  position: absolute;
  right: 22px;
  bottom: 22px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  z-index: 5;
}
.zoomctl button {
  width: 30px;
  height: 30px;
  border: 1px solid var(--ink-ghost);
  background: var(--bg);
  font-size: 14px;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 200ms, color 200ms;
}
.zoomctl button:hover { background: var(--ink); color: var(--bg); }
.zoomctl button:first-child { border-radius: 16px 16px 0 0; }
.zoomctl button:last-child  { border-radius: 0 0 16px 16px; }

/* =========================================================
   FLOATING CARD STACK — content overlays the 3D scene (no panel reflow)
   ========================================================= */
.cardstack {
  position: absolute;
  top: 156px; /* lowered ~100px globally so cards clear the top nav */
  right: 18px;
  bottom: 18px;
  width: min(420px, 40vw);
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  overflow-x: visible;
  padding: 2px;
  pointer-events: none; /* let drags pass through the gaps between cards */
  z-index: 20;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cardstack::-webkit-scrollbar { display: none; }
.cardstack.is-wide { width: min(380px, 42vw); }
.ipod-panel-wrap { display: flex; justify-content: center; padding-top: 4px; } /* iPod column a touch narrower & tidy */
.cardstack > * { pointer-events: auto; } /* but cards themselves are interactive */

/* a small floating close control that sits above the stack */
.stack-close {
  position: absolute;
  top: 156px; /* lowered ~100px to match .cardstack */
  right: 18px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border: 1px solid var(--ink-ghost);
  color: var(--ink-soft);
  font-size: 15px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 30;
  box-shadow: 0 4px 14px -4px rgba(43,23,3,0.18);
  transition: transform 250ms var(--ease-spatial), background-color 250ms;
}
.stack-close.is-visible { display: flex; }
.stack-close:hover {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
  transform: rotate(90deg);
}

/* ---- Card-style content blocks (JKane-inspired) ---- */
.card-block {
  background: rgba(255,255,255,0.96);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 20px 22px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 18px 44px -18px rgba(43,23,3,0.20);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
  flex-shrink: 0;
}
.card-block:nth-child(1) { animation-delay: 40ms; }
.card-block:nth-child(2) { animation-delay: 110ms; }
.card-block:nth-child(3) { animation-delay: 180ms; }
.card-block:nth-child(4) { animation-delay: 250ms; }
.card-block:nth-child(5) { animation-delay: 320ms; }
.card-block:nth-child(6) { animation-delay: 390ms; }
.card-block:nth-child(7) { animation-delay: 460ms; }
.card-block:nth-child(8) { animation-delay: 530ms; }
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.card-block .ct {
  font-family: "Instrument Sans", sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 8px;
}
.card-block .cb {
  font-size: 13px;
  line-height: 1.55;
  color: rgba(43,23,3,0.62);
}
.card-block .cb a { color: var(--ink); border-bottom: 1px solid var(--ink-ghost); }
.card-block .cb a:hover { border-bottom-color: var(--ink); }

/* ---- List rows inside content card stacks (books, refs, films, etc.) ---- */
.ref-list { display: flex; flex-direction: column; gap: 11px; }
.ref-row { display: flex; flex-direction: column; gap: 2px; }
.ref-name, .ref-link {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.3;
}
.ref-link {
  align-self: flex-start;
  border-bottom: 1px solid var(--ink-ghost); /* subtle, not loud */
  transition: border-color 160ms var(--ease-1);
}
.ref-link:hover { border-bottom-color: var(--ink); }
.ref-desc { font-size: 12px; line-height: 1.45; color: rgba(43,23,3,0.5); }
.ref-foot {
  font-size: 11.5px;
  color: rgba(43,23,3,0.42);
  padding: 0 2px;
  font-style: italic;
}

/* A card with a thumbnail on the left + text on the right (like the JKane work cards) */
.card-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.card-row .thumb {
  flex: 0 0 96px;
  width: 96px;
  height: 96px;
  border-radius: 12px;
  object-fit: cover;
  background: var(--bg-soft);
  display: block;
}
.card-row .rt {
  flex: 1;
  min-width: 0;
}

/* The profile photo card for About Me */
.profile-card {
  background: rgba(255,255,255,0.96);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 16px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 18px 44px -18px rgba(43,23,3,0.20);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
  animation-delay: 20ms;
  flex-shrink: 0;
}
.profile-card .photo {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 12px;
  object-fit: cover;
  display: block;
  background: var(--bg-soft);
}
.profile-card .pmeta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-top: 14px;
  padding: 0 4px 2px;
}
.profile-card .pname {
  font-family: "Instrument Sans", sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.profile-card .prole {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

/* small "chips" row inside a card (e.g. for cv child links) */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip {
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 5px 11px;
  border-radius: 14px;
  background: var(--bg-soft);
  color: var(--ink-soft);
}

/* iPod artifact inside side panel — large & tactile */
.ipod-mock {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 33 / 56;
  background: linear-gradient(155deg, #fdfdfd 0%, #ededed 55%, #d8d8d8 100%);
  border-radius: 30px;
  border: 1px solid rgba(43,23,3,0.10);
  box-shadow:
    0 40px 80px -28px rgba(43,23,3,0.30),
    0 12px 28px -10px rgba(43,23,3,0.16),
    inset 0 2px 0 rgba(255,255,255,0.9),
    inset 0 -2px 6px rgba(43,23,3,0.05);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.ipod-screen {
  flex: 0 0 52%;
  background: linear-gradient(160deg, #c3cdaa 0%, #b4bf99 100%);
  border-radius: 6px;
  border: 1px solid rgba(43,23,3,0.45);
  display: flex;
  flex-direction: column;
  padding: 12px 13px;
  font-family: "Nunito", sans-serif;
  color: rgb(22, 30, 12);
  box-shadow:
    inset 0 3px 10px rgba(43,23,3,0.22),
    inset 0 -1px 0 rgba(255,255,255,0.25);
  overflow: hidden;
}
.ipod-screen .now {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(43,23,3,0.25);
  padding-bottom: 6px;
  margin-bottom: 8px;
}
.ipod-screen .now .bat {
  width: 18px; height: 9px;
  border: 1px solid rgba(43,23,3,0.5);
  border-radius: 2px;
  position: relative;
  padding: 1px;
}
.ipod-screen .now .bat::after {
  content: ""; display: block; width: 70%; height: 100%;
  background: rgba(22,30,12,0.8); border-radius: 1px;
}
.ipod-screen .art {
  width: 64px; height: 64px;
  border-radius: 3px;
  background: linear-gradient(135deg, rgba(22,30,12,0.18), rgba(22,30,12,0.05));
  border: 1px solid rgba(43,23,3,0.3);
  margin: 2px auto 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.ipod-screen .track { font-weight: 700; font-size: 14px; text-align: center; line-height: 1.2; margin-bottom: 3px; }
.ipod-screen .artist { opacity: 0.72; font-size: 11px; text-align: center; }
.ipod-screen .bar {
  margin-top: auto;
  height: 4px;
  background: rgba(43,23,3,0.18);
  border-radius: 3px;
  overflow: hidden;
}
.ipod-screen .bar i {
  display: block;
  width: 38%;
  height: 100%;
  background: rgb(22, 30, 12);
  border-radius: 3px;
}
.ipod-screen .times {
  display: flex; justify-content: space-between;
  font-size: 9px; opacity: 0.65; margin-top: 4px;
}
/* Song list view inside the screen */
.ipod-list {
  list-style: none;
  margin: 0; padding: 0;
  overflow: hidden;
  font-size: 11px;
  line-height: 1.45;
}
.ipod-list li {
  padding: 2px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-radius: 2px;
}
.ipod-list li.sel {
  background: rgb(36, 60, 140);
  color: #eef3ff;
  font-weight: 600;
}
.ipod-wheel {
  flex: 1;
  aspect-ratio: 1;
  align-self: center;
  max-height: 240px;
  background: radial-gradient(circle at 50% 42%, #ffffff 0%, #e6e6e6 68%, #cfcfcf 100%);
  border-radius: 50%;
  position: relative;
  border: 1px solid rgba(43,23,3,0.10);
  box-shadow:
    inset 0 -3px 12px rgba(43,23,3,0.10),
    inset 0 3px 6px rgba(255,255,255,0.95),
    0 2px 6px rgba(43,23,3,0.06);
  cursor: pointer;
  user-select: none;
}
.ipod-wheel .lbl {
  position: absolute;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(43,23,3,0.40);
  transition: color 180ms;
}
.ipod-wheel .lbl:hover { color: rgba(43,23,3,0.75); }
.ipod-wheel .lbl.menu { top: 14px; left: 50%; transform: translateX(-50%); }
.ipod-wheel .lbl.prev { left: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; }
.ipod-wheel .lbl.next { right: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; }
.ipod-wheel .lbl.play { bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 14px; }
.ipod-wheel .center {
  position: absolute;
  top: 50%; left: 50%;
  width: 40%;
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 50% 38%, #fbfbfb 0%, #dcdcdc 100%);
  border-radius: 50%;
  border: 1px solid rgba(43,23,3,0.14);
  box-shadow:
    inset 0 1px 3px rgba(255,255,255,0.95),
    0 1px 3px rgba(43,23,3,0.10);
  transition: transform 140ms var(--ease-spatial);
}
.ipod-wheel .center:active { transform: translate(-50%, -50%) scale(0.95); }
.ipod-note {
  text-align: center;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* =========================================================
   OVERLAY ARTIFACT — for Space Invaders style takeovers
   ========================================================= */
.overlay {
  position: fixed;
  inset: 50px 0 0 0;
  background: rgba(246,246,246,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 500ms var(--ease-morph);
}
.overlay.is-open { opacity: 1; pointer-events: auto; }
.overlay .card {
  width: min(720px, 90vw);
  height: min(440px, 70vh);
  background: var(--bg);
  border: 1px solid var(--ink-ghost);
  border-radius: 14px;
  box-shadow:
    0 50px 100px -20px rgba(43,23,3,0.18),
    0 12px 30px -8px rgba(43,23,3,0.12);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  transform: scale(0.94);
  transition: transform 500ms var(--ease-gooey);
}
.overlay.is-open .card { transform: scale(1); }
/* Invaders overlay card: sized to hold the 840px game artifact */
.overlay .card.invaders-card {
  width: auto;
  max-width: 94vw;
  height: auto;
  max-height: 88vh;
  padding: 18px 22px 24px;
  gap: 10px;
  overflow: auto;
}
.overlay .card.invaders-card .title { margin-bottom: 4px; }
.overlay .card .close {
  position: absolute;
  top: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--ink-ghost);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--ink-soft);
  transition: transform 250ms var(--ease-spatial), background-color 250ms;
}
.overlay .card .close:hover {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
  transform: rotate(90deg);
}
.overlay .card .title {
  font-family: "Nunito", sans-serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.overlay .card .sub {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.overlay .card .mock {
  width: 70%;
  aspect-ratio: 16/9;
  border: 1px dashed var(--ink-ghost);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Tooltip showing the focused pill's full label when small */
.focuslabel {
  position: absolute;
  bottom: 68px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Nunito", sans-serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--ink);
  pointer-events: none;
  opacity: 0;
  transition: opacity 360ms var(--ease-spatial);
}
.focuslabel.is-visible { opacity: 1; }

/* Smaller adjustments for narrow screens */
@media (max-width: 720px) {
  :root { --gutter: 12px; --nav-gap: 8px; }

  .nav-row { flex-wrap: nowrap; justify-content: flex-start; align-items: center; gap: 8px; overflow: visible; }
  .nav-pill { flex: 0 0 auto; width: auto; }
  .nav-pill.home, .nav-pill.nav-practice, .nav-pill.nav-fss { width: auto; }
  .nav-pill.home { flex: 1 1 0; min-width: 0; order: 1; }
  .nav-pill.home .name-full  { display: none; }
  .nav-pill.home .name-short { display: inline; }
  .nav-pill.nav-practice { order: 2; flex: 0 0 auto; }
  .nav-pill.nav-fss      { order: 3; flex: 0 0 auto; }

  .cardstack { width: min(92vw, 360px); top: 112px; right: 12px; bottom: 12px; }
  .cardstack.is-wide { width: min(92vw, 320px); }
  .anchor { height: 36px; line-height: 36px; padding: 0 18px; }
  .anchor.has-3d { width: 116px; height: 116px; padding: 0; line-height: normal; }
  .hud { font-size: 9px; }

  /* CV / Resume panel — ease proportions down on narrow viewports */
  .cvp-photo { width: 96px; height: 96px; flex-basis: 96px; border-radius: 14px; }
  .cvp-topmeta { height: 96px; }
  .cvp-proj .pthumb { width: 72px; height: 72px; flex-basis: 72px; }
  .cvp-logos { padding: 12px 12px; gap: 7px; }
  .cvp-logos .logo-cell { height: 16px; }
}
/* =========================================================
   ABOUT-ME PANEL — rich layout matching the reference design
   info/work/contact segmented header, EN·JP, live clock,
   profile, bio (long/short), client logos, project cards
   ========================================================= */
.about-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

/* segmented header bar that floats above the card */
.ap-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.96);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  padding: 7px 8px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 14px 34px -18px rgba(43,23,3,0.20);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 520ms var(--ease-gooey) forwards;
}
.ap-bar .ap-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--bg-soft) center/cover no-repeat;
  border: 1px solid var(--ink-ghost);
  flex: 0 0 auto;
  overflow: hidden;
}
.ap-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ap-seg { display: flex; gap: 6px; margin-left: auto; }
.ap-seg button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 12px;
  border-radius: 16px;
  background: var(--pill-bg);
  color: var(--ink-soft);
  font-size: 12.5px;
  letter-spacing: 0.005em;
  transition: background 160ms var(--ease-spatial), color 160ms var(--ease-spatial);
}
.ap-seg button .ic {
  font-size: 13px;
  line-height: 1;
  opacity: 0.7;
}
.ap-seg button:hover { background: var(--pill-bg-hover); color: var(--ink); }
.ap-seg button.is-on {
  background: var(--accent);
  color: var(--ink);
}
.ap-seg button.is-on .ic { opacity: 1; }

/* main frosted card */
.ap-card {
  background: rgba(255,255,255,0.97);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 16px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 18px 44px -18px rgba(43,23,3,0.20);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
  animation-delay: 70ms;
}

/* top row: square photo + EN/JP + clock */
.ap-top { display: flex; gap: 14px; align-items: flex-start; }
.ap-photo {
  flex: 0 0 76px;
  width: 76px; height: 76px;
  border-radius: 12px;
  object-fit: cover;
  background: var(--bg-soft);
  display: block;
}
.ap-topmeta { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 76px; }
.ap-topbar { display: flex; align-items: center; justify-content: space-between; }
.ap-lang { display: flex; gap: 8px; font-size: 12.5px; }
.ap-lang button {
  color: var(--ink-faint);
  letter-spacing: 0.02em;
  transition: color 160ms;
}
.ap-lang button.is-on { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
.ap-lang button:hover { color: var(--ink-soft); }
.ap-clock {
  font-variant-numeric: tabular-nums;
  font-size: 12.5px;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
}

/* bio */
.ap-bio {
  margin-top: 14px;
  font-size: 13px;
  line-height: 1.55;
  color: rgba(43,23,3,0.72);
  position: relative;
}
.ap-bio .short { display: none; }
.about-panel.is-short .ap-bio .short { display: block; }
.about-panel.is-short .ap-bio .long  { display: none; }
.ap-biofoot { display: flex; justify-content: flex-end; margin-top: 8px; }
.ap-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 13px;
  background: var(--pill-bg);
  color: var(--ink-soft);
  transition: background 160ms, color 160ms;
}
.ap-toggle:hover { background: var(--pill-bg-hover); color: var(--ink); }
.ap-cv { margin-top: 12px; }
.ap-cv-btn {
  display: inline-flex; align-items: center;
  font-size: 12px; font-weight: 500;
  padding: 7px 16px;
  border-radius: 16px;
  background: var(--pill-bg);
  color: var(--ink);
  transition: background 160ms, color 160ms;
}
.ap-cv-btn:hover { background: var(--ink); color: var(--bg); }
.ap-toggle .chev { font-size: 9px; opacity: 0.7; }

/* client logo strip */
.ap-logos {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--ink-ghost);
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  color: rgba(43,23,3,0.55);
}
.ap-logos .logo {
  font-family: "Nunito", sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.01em;
  white-space: nowrap;
  opacity: 0.78;
  transition: opacity 200ms;
}
.ap-logos .logo:hover { opacity: 1; }

/* project / work cards */
.ap-work { display: flex; flex-direction: column; gap: 12px; }
.ap-proj {
  display: flex;
  gap: 14px;
  align-items: stretch;
  background: rgba(255,255,255,0.97);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 14px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 16px 40px -20px rgba(43,23,3,0.18);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
  cursor: default;
  transition: box-shadow 300ms var(--ease-spatial), transform 300ms var(--ease-spatial);
}
.ap-proj:hover {
  box-shadow:
    0 1px 2px rgba(43,23,3,0.05),
    0 22px 50px -18px rgba(43,23,3,0.26);
}
.ap-proj .pthumb {
  flex: 0 0 84px;
  width: 84px; height: 84px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-family: "Nunito", sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.02em;
  color: rgba(255,255,255,0.92);
  overflow: hidden;
  position: relative;
}
.ap-proj .pbody { flex: 1; min-width: 0; }
.ap-proj .pt {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 5px;
}
.ap-proj .pb {
  font-size: 12px;
  line-height: 1.5;
  color: rgba(43,23,3,0.6);
}

/* contact footer card */
.ap-contact {
  background: rgba(255,255,255,0.97);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 16px 40px -20px rgba(43,23,3,0.18);
  display: flex;
  flex-direction: column;
  gap: 3px;
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
}
.ap-contact a, .ap-contact span { font-size: 13px; color: rgba(43,23,3,0.72); }
.ap-contact a:hover { color: var(--ink); }

/* staggered entrance for the whole stack */
.about-panel .ap-proj:nth-of-type(1) { animation-delay: 200ms; }
.about-panel .ap-proj:nth-of-type(2) { animation-delay: 270ms; }
.about-panel .ap-proj:nth-of-type(3) { animation-delay: 340ms; }
.about-panel .ap-contact { animation-delay: 410ms; }

/* WORK & CONTACT tab bodies share card-block styling already defined */
.ap-tabbody { display: flex; flex-direction: column; gap: 12px; }

/* =========================================================
   CV / RESUME PANEL — dedicated layout matching the reference
   mockup (resume-info.png / .svg): info / work / contact tabs,
   EN·JP, live clock, photo, long/short bio, client logos in
   their own pill, nested project rows, contact card.
   Scoped under .cv-panel / .cvp-* (separate from .ap-*) so the
   existing "Benjamin anchor" card and its styling are untouched.
   The tab-pill header reuses .ap-bar / .ap-avatar / .ap-seg as-is.
   ========================================================= */
.cv-panel { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }

/* info card — photo · EN/JP + clock · bio · long/short toggle */
.cvp-card {
  background: rgba(255,255,255,0.97);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-radius: 26px;
  padding: 18px;
  box-shadow:
    0 1px 2px rgba(43,23,3,0.04),
    0 18px 44px -18px rgba(43,23,3,0.20);
  opacity: 0;
  transform: translateY(14px) scale(0.98);
  animation: cardIn 560ms var(--ease-gooey) forwards;
  animation-delay: 70ms;
}
.cvp-top { display: flex; gap: 14px; align-items: flex-start; }
.cvp-photo {
  flex: 0 0 124px;
  width: 124px; height: 124px;
  border-radius: 16px;
  object-fit: cover;
  background: var(--bg-soft);
  display: block;
}
.cvp-topmeta { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 124px; }
.cvp-topbar { display: flex; align-items: center; justify-content: space-between; }
.cvp-lang { display: flex; gap: 8px; font-size: 12.5px; }
.cvp-lang button { color: var(--ink-faint); letter-spacing: 0.02em; transition: color 160ms; }
.cvp-lang button.is-on { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
.cvp-lang button:hover { color: var(--ink-soft); }

.ipod {

.ipod::before {

          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><polygon points='0,0 8,4 0,8'/></svg>") center/contain no-repeat;

.ipod-wheel-center {

<script>
// =============================================================
// 3D SPATIAL PROTOTYPE
// =============================================================
// Architecture:
//   stage    →  has CSS perspective (sets the eye distance)
//   universe →  rotates as user drags (rotateX, rotateY)
//   pills    →  positioned in 3D on a sphere using CSS vars (--x, --y, --z)
//   face     →  inner div that counter-rotates to billboard text to the viewer
//
// Every frame during drag we:
//   1. Recompute the universe's rotation matrix from drag deltas
//   2. For each pill: derive its current world-space position (after rotation)
//   3. Use that world-Z to set its depth-driven opacity/blur/shadow
//   4. Set the face's counter-rotation so the text stays flat-facing
//
// Idle-time gentle drift gives the "gooey" floating feel.

(function() {
  'use strict';

  const NODES = [
    // Primary nodes
    { id: 'practice',  label: 'practice',            children: ['all work', 'public work', 'confidential work 🔒', 'experiments', 'previous identities'] },
    { id: 'fss',       label: 'futuresupersonic',    children: ['independent creative practice', 'SUZURI', 'publications', 'objects', 'future projects'] },
    { id: 'designer',  label: 'conceptual designer', children: ['systems thinking', 'behavioral design', 'concept design', 'industrial design', 'experience strategy'] },
    { id: 'cv',        label: 'cv / resume',         children: ['experience', 'selected work', 'education', 'tools'] },
    // Personal / playful / standalone
    { id: 'listen',    label: 'listen',              artifact: 'ipod' },
    { id: 'invaders',  label: 'space invaders',      artifact: 'invaders' },
    { id: 'sns',       label: 'social',              children: ['Dribbble', 'LinkedIn', 'Instagram', 'X / Twitter'] },
    { id: 'books',     label: 'books',               children: ['The Tipping Point', 'Outliers', 'The Death and Life of Great American Cities', 'Cradle to Cradle', 'The Internet of Things', 'Logo Modernism'] },
    { id: 'films',     label: 'films',               children: ['Akira', 'Boyz n the Hood', 'Ready Player One', 'Rams', 'Ghost in the Shell', 'Design & Thinking', 'Blade Runner', 'The Matrix', 'Alphaville', 'Objectified'] },
    { id: 'refs',      label: 'design references',   children: ['Ten Principles for Good Design', 'Design’s Role in Sustainable Consumption', 'Design Ah! / デザインあ', 'Page Flows', 'Visual Complexity', 'GSAP', 'Mobbin'] },
    { id: 'influence', label: 'influences',          children: ['Ryuichi Sakamoto', 'Dieter Rams', 'Ross Lovegrove', 'Y2K', 'Senseware', 'Totemic design', 'Brian Jungen', 'Steve Jobs'] },
    { id: 'obsess',    label: 'weird obsessions',    children: ['チョロバイ', 'Toques', 'Behavioral systems', 'Invisible intelligence', 'Cultural semiotics', 'Informational mapping'] },
    { id: 'artifacts', label: 'internet artifacts',  children: ['Getty', 'Scripting Harmony', 'Radio Garden', 'PingMag', 'My 80’s TV', 'ArtKit'] },
    { id: 'notes',     label: 'notes',               children: ['chicken, beef, fish, meat, vegetables, fruits, nuts… coffee, tea', 'love is trust', 'there is no spoon', 'no untouchable forces', 'you’re in a perfect dance w/…'] },
  ];

  // Children objects are created lazily on first expand and cached here by parent id.
  const childGroups = {}; // parentId → [ { node, el, face, thread, basePos } ]

  // DOM
  const stage      = document.getElementById('stage');
  const universe   = document.getElementById('universe');
  const focuslabel = document.getElementById('focuslabel');
  const hud        = document.getElementById('hud');
  const frame      = document.getElementById('frame');
  const cardstack  = document.getElementById('cardstack');
  const stackClose = document.getElementById('stackClose');
  const overlay    = document.getElementById('overlay');
  const overlayClose = document.getElementById('overlayClose');
  const overlayTitle = document.getElementById('overlayTitle');
  const zoomInBtn  = document.getElementById('zoomIn');
  const zoomOutBtn = document.getElementById('zoomOut');

  // State
  let rx = -8;  // pitch (deg)
  let ry =  20; // yaw (deg)
  let rxTarget = rx;
  let ryTarget = ry;
  let SPHERE_R = 360; // radius of the sphere in px
  let SPHERE_R_TARGET = SPHERE_R;
  const SPHERE_R_MIN = 200;
  const SPHERE_R_MAX = 720;

  // Build the pills.
  // We arrange the 13 nodes on a Fibonacci sphere (more even than lat/long
  // grid and avoids polar clustering).
  const pills = [];
  function fibSpherePositions(n, radius) {
    const out = [];
    const offset = 2 / n;
    const increment = Math.PI * (3 - Math.sqrt(5)); // golden angle
    for (let i = 0; i < n; i++) {
      const y = ((i * offset) - 1) + (offset / 2);
      const r = Math.sqrt(1 - y * y);
      const phi = i * increment;
      const x = Math.cos(phi) * r;
      const z = Math.sin(phi) * r;
      out.push({ x: x * radius, y: y * radius, z: z * radius });
    }
    return out;
  }

  function buildPills() {
    const positions = fibSpherePositions(NODES.length, SPHERE_R);
    NODES.forEach((node, i) => {
      const p = positions[i];

      // --- Connector line (origin → pill), lives in the universe so it rotates too ---
      const thread = document.createElement('div');
      thread.className = 'thread';
      thread.innerHTML = '<div class="line"></div>';
      orientThread(thread, p);
      universe.appendChild(thread);

      // --- Pill ---
      const el = document.createElement('div');
      el.className = 'pill';
      el.dataset.id = node.id;
      el.innerHTML = '<div class="face">' + node.label + '</div>';
      el.style.setProperty('--x', p.x + 'px');
      el.style.setProperty('--y', p.y + 'px');
      el.style.setProperty('--z', p.z + 'px');
      universe.appendChild(el);

      const face = el.querySelector('.face');
      face.addEventListener('click', e => {
        e.stopPropagation();
        handlePillClick(node, el);
      });

      pills.push({ node, el, face, thread, basePos: p, pos: { ...p } });
    });
  }

  // Orient a thread element from the origin toward a 3D point, stopping short
  // of both ends so it never touches the anchor or the pill.
  function orientThread(thread, p) {
    const { x, y, z } = p;
    const horiz = Math.sqrt(x * x + z * z);
    const dist  = Math.sqrt(x * x + y * y + z * z);
    // azimuth around Y: reach the (x, z) direction. CSS rotateY(+θ) sends +X to
    // (cosθ, 0, -sinθ), so θ = atan2(-z, x).
    const az = Math.atan2(-z, x) * 180 / Math.PI;
    // elevation via rotateZ (XY plane, +Y is down in CSS): θ = atan2(y, horiz).
    const el = Math.atan2(y, horiz) * 180 / Math.PI;
    const startGap = 30; // gap near the anchor
    const endGap   = 26; // gap near the pill
    const len = Math.max(0, dist - startGap - endGap);
    thread.style.setProperty('--az', az.toFixed(3) + 'deg');
    thread.style.setProperty('--el', el.toFixed(3) + 'deg');
    thread.style.setProperty('--gap', startGap + 'px');
    thread.style.setProperty('--len', len.toFixed(1) + 'px');
  }

  // Per-frame depth calculation. Rotates each pill's local (x,y,z) by the
  // universe's current rotation matrix, then derives world-Z so we can set
  // opacity, blur, shadow strength, and a counter-rotation for the face.
  function updateDepth() {
    // Build rotation matrix from rx, ry. Order: rotateX(rx) * rotateY(ry).
    // We pre-compute the world position of each pill, but only to derive depth
    // and counter-rotation — the actual rendering is still done by CSS using
    // the universe's transform.
    const rxRad = (rx * Math.PI) / 180;
    const ryRad = (ry * Math.PI) / 180;
    const cosX = Math.cos(rxRad), sinX = Math.sin(rxRad);
    const cosY = Math.cos(ryRad), sinY = Math.sin(ryRad);

    let nearest = null;
    let nearestZ = -Infinity;

    // Process one body (primary or child). Returns its worldZ.
    function processBody(p) {
      const { x, y, z } = p.basePos;
      const x1 =  cosY * x + sinY * z;
      const z1 = -sinY * x + cosY * z;
      const y2 =  cosX * y - sinX * z1;
      const z2 =  sinX * y + cosX * z1;

      const worldZ = z2;
      const tNear = (worldZ + SPHERE_R) / (2 * SPHERE_R);

      const opacity = 0.32 + 0.68 * tNear;
      const blur    = (1 - tNear) * 1.4;
      const shadow  = tNear * 14;
      const shadowBlur = 8 + tNear * 18;
      const shadowA = 0.04 + tNear * 0.10;

      p.el.style.setProperty('--depth-opacity', opacity.toFixed(3));
      p.el.style.setProperty('--depth-blur', blur.toFixed(2) + 'px');
      p.el.style.setProperty('--depth-shadow', shadow.toFixed(1) + 'px');
      p.el.style.setProperty('--depth-shadow-blur', shadowBlur.toFixed(1) + 'px');
      p.el.style.setProperty('--depth-shadow-a', shadowA.toFixed(3));

      if (p.thread) {
        p.thread.style.setProperty('--thread-a', (0.35 + 0.65 * tNear).toFixed(3));
      }
      if (p.face) {
        p.face.style.setProperty('--cy', (-ry).toFixed(2) + 'deg');
        p.face.style.setProperty('--cx', (-rx).toFixed(2) + 'deg');
      }
      return worldZ;
    }

    pills.forEach(p => {
      const worldZ = processBody(p);
      if (worldZ > nearestZ) { nearestZ = worldZ; nearest = p; }
      p.el.classList.toggle('is-near', false);
    });

    // Children (if any group is expanded)
    activeChildren.forEach(c => processBody(c));

    if (nearest) nearest.el.classList.add('is-near');
    // Show the focus label when zoomed-out enough that small text becomes hard to read
    if (nearest && SPHERE_R < 280) {
      focuslabel.textContent = nearest.node.label;
      focuslabel.classList.add('is-visible');
    } else {
      focuslabel.classList.remove('is-visible');
    }
  }

  // Apply universe transform (rotation + scale derived from SPHERE_R)
  function applyUniverse() {
    // Sphere radius scaling is implemented by scaling the universe itself.
    // We keep the positions fixed at the original radius and scale visually.
    const s = SPHERE_R / 360;
    universe.style.transform =
      'translate(-50%, -50%) scale(' + s.toFixed(3) + ') rotateX(' + rx.toFixed(2) + 'deg) rotateY(' + ry.toFixed(2) + 'deg)';
  }

  // Smoothed animation loop (RAF-driven)
  // Even when not dragging, target values smoothly approach actual values for
  // that gooey settling feel after a release.
  let rafId = null;
  let lastT = 0;
  let driftRy = 0; // ambient drift when idle
  let idleTimer = 0;
  let cardsOpen = false; // when content cards are open, calm the drift
  const IDLE_THRESHOLD = 1200; // ms after last input → start drifting

  function tick(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(48, t - lastT);
    lastT = t;

    // Idle drift — slow rotation around Y axis if user has been still.
    // Calm it to a near-still crawl while content cards are open so it doesn't distract.
    idleTimer += dt;
    if (idleTimer > IDLE_THRESHOLD && !dragging) {
      const driftRate = cardsOpen ? 0.0012 : 0.004;
      driftRy += dt * driftRate;
      ryTarget += dt * driftRate;
    }

    // Critically-damped-ish lerp toward target
    const k = 1 - Math.pow(0.001, dt / 1000); // ~63% close per 1s
    rx += (rxTarget - rx) * k;
    ry += (ryTarget - ry) * k;
    SPHERE_R += (SPHERE_R_TARGET - SPHERE_R) * k;

    applyUniverse();
    updateDepth();

    rafId = requestAnimationFrame(tick);
  }

  // --- Drag to rotate ---
  let dragging = false;
  let lastClientX = 0, lastClientY = 0;
  let downX = 0, downY = 0, didMove = false;

  stage.addEventListener('mousedown', e => {
    // Don't start a drag if user clicked a pill
    if (e.target.closest('.pill')) return;
    dragging = true;
    didMove = false;
    downX = e.clientX; downY = e.clientY;
    lastClientX = e.clientX;
    lastClientY = e.clientY;
    stage.classList.add('is-dragging');
    universe.classList.add('is-dragging');
    hud.classList.add('is-hidden');
    idleTimer = 0;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastClientX;
    const dy = e.clientY - lastClientY;
    lastClientX = e.clientX;
    lastClientY = e.clientY;
    if (Math.abs(e.clientX - downX) > 4 || Math.abs(e.clientY - downY) > 4) didMove = true;
    ryTarget += dx * 0.45;
    rxTarget -= dy * 0.35;
    // Clamp pitch so we don't flip upside down
    rxTarget = Math.max(-80, Math.min(80, rxTarget));
    idleTimer = 0;
  });

  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('is-dragging');
    universe.classList.remove('is-dragging');
    universe.classList.add('is-resting');
    setTimeout(() => universe.classList.remove('is-resting'), 1400);
    // A clean click on empty space collapses any open child group
    if (!didMove && expandedParentId) collapseChildren();
    idleTimer = 0;
  });

  // Touch support
  stage.addEventListener('touchstart', e => {
    if (e.target.closest('.pill')) return;
    if (e.touches.length !== 1) return;
    dragging = true;
    lastClientX = e.touches[0].clientX;
    lastClientY = e.touches[0].clientY;
    stage.classList.add('is-dragging');
    universe.classList.add('is-dragging');
    idleTimer = 0;
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - lastClientX;
    const dy = t.clientY - lastClientY;
    lastClientX = t.clientX;
    lastClientY = t.clientY;
    ryTarget += dx * 0.45;
    rxTarget -= dy * 0.35;
    rxTarget = Math.max(-80, Math.min(80, rxTarget));
    idleTimer = 0;
  }, { passive: true });
  window.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('is-dragging');
    universe.classList.remove('is-dragging');
  });

  // --- Scroll to zoom (no Cmd required since this is a 3D scene, not a 2D canvas) ---
  stage.addEventListener('wheel', e => {
    e.preventDefault();
    // Normalize wheel delta — trackpads send small values, mice send ~100
    const d = Math.max(-50, Math.min(50, e.deltaY));
    const factor = Math.exp(d * 0.0025);
    SPHERE_R_TARGET = Math.max(SPHERE_R_MIN, Math.min(SPHERE_R_MAX, SPHERE_R_TARGET * factor));
    idleTimer = 0;
  }, { passive: false });

  zoomInBtn.addEventListener('click', () => {
    SPHERE_R_TARGET = Math.min(SPHERE_R_MAX, SPHERE_R_TARGET * 1.18);
    idleTimer = 0;
  });
  zoomOutBtn.addEventListener('click', () => {
    SPHERE_R_TARGET = Math.max(SPHERE_R_MIN, SPHERE_R_TARGET / 1.18);
    idleTimer = 0;
  });

  // --- Pill click handlers ---
  let expandedParentId = null; // which primary node currently has children shown

  function handlePillClick(node, el) {
    // Orbit the universe so the clicked pill rotates toward the camera.
    const p = pills.find(p => p.el === el);
    if (p) {
      const { x, y, z } = p.basePos;
      let targetRy = -Math.atan2(x, z) * 180 / Math.PI;
      const r = Math.sqrt(x*x + z*z);
      let targetRx = Math.atan2(y, r) * 180 / Math.PI;
      ryTarget = targetRy;
      rxTarget = Math.max(-80, Math.min(80, targetRx));
    }

    if (node.artifact === 'ipod') {
      pills.forEach(pp => pp.el.classList.remove('is-active'));
      el.classList.add('is-active');
      collapseChildren(); // close any open group when opening an artifact
      openIPod(node);
    } else if (node.artifact === 'invaders') {
      pills.forEach(pp => pp.el.classList.remove('is-active'));
      el.classList.add('is-active');
      collapseChildren();
      openInvaders(node);
    } else if (node.panel) {
      // "about me" → rich panel (info/work/contact), not child expansion
      pills.forEach(pp => pp.el.classList.remove('is-active'));
      el.classList.add('is-active');
      collapseChildren();
      closeOverlay();
      openAboutPanel(node);
    } else if (node.id === 'cv') {
      // CV / Resume → dedicated info/work/contact panel (see openCVPanel),
      // not the generic child-expansion card stack.
      pills.forEach(pp => pp.el.classList.remove('is-active'));
      el.classList.add('is-active');
      collapseChildren();
      closeOverlay();
      openCVPanel(node);
    } else if (node.children && node.children.length) {
      // Toggle: clicking the already-open node closes the orbit group + the card stack.
      if (expandedParentId === node.id) {
        collapseChildren();
        closeSide();
      } else {
        collapseChildren();                   // close any previous child group
        closeOverlay();                       // close invaders if open
        expandChildren(node, p);              // orbit child pop-out (sets parent is-active)
        openSide(node.label, cardsFor(node)); // copy section pop-out on the right
      }
    }
    idleTimer = 0;
  }

  // --- Child node expansion (local sphere around the parent) ---
  let activeChildren = []; // [{ node, el, face, thread, basePos, parentPos }]

  function expandChildren(parentNode, parentPill) {
    expandedParentId = parentNode.id;
    parentPill.el.classList.add('is-active');

    // Build (or reuse) the child group.
    let group = childGroups[parentNode.id];
    const parentPos = parentPill.basePos;

    if (!group) {
      group = [];
      const n = parentNode.children.length;
      // Local cluster radius scales gently with child count
      const clusterR = 90 + n * 10;
      // Distribute children on a small local sphere around the parent.
      // We push them slightly OUTWARD (away from origin) so they sit "in front of"
      // the parent relative to the center, reducing overlap with the core sphere.
      const localPts = fibSpherePositions(n, clusterR);
      // Outward bias direction = normalized parent position
      const plen = Math.sqrt(parentPos.x**2 + parentPos.y**2 + parentPos.z**2) || 1;
      const outward = { x: parentPos.x/plen, y: parentPos.y/plen, z: parentPos.z/plen };

      parentNode.children.forEach((label, i) => {
        const lp = localPts[i];
        // Child absolute position = parent + local offset + small outward push
        const bx = parentPos.x + lp.x + outward.x * 40;
        const by = parentPos.y + lp.y + outward.y * 40;
        const bz = parentPos.z + lp.z + outward.z * 40;

        const el = document.createElement('div');
        el.className = 'pill is-child';
        el.innerHTML = '<div class="face">' + label + '</div>';
        el.style.setProperty('--x', bx + 'px');
        el.style.setProperty('--y', by + 'px');
        el.style.setProperty('--z', bz + 'px');

        // Thread from this child back to the PARENT (not the origin)
        const thread = document.createElement('div');
        thread.className = 'thread is-child-thread';
        thread.innerHTML = '<div class="line"></div>';
        // Position the thread element at the parent's location, orient toward child
        thread.style.setProperty('--ox', parentPos.x + 'px');
        thread.style.setProperty('--oy', parentPos.y + 'px');
        thread.style.setProperty('--oz', parentPos.z + 'px');
        orientChildThread(thread, parentPos, { x: bx, y: by, z: bz });

        const childObj = { node: { id: parentNode.id + ':' + i, label, parentId: parentNode.id }, el, face: null, thread, basePos: { x: bx, y: by, z: bz } };
        group.push(childObj);
      });
      childGroups[parentNode.id] = group;
    }

    // Mount with a staggered "pop" entrance
    group.forEach((c, i) => {
      universe.appendChild(c.thread);
      universe.appendChild(c.el);
      c.face = c.el.querySelector('.face');
      // start small
      c.el.style.setProperty('--child-scale', '0.2');
      c.el.style.setProperty('--child-op', '0');
      c.thread.style.setProperty('--thread-grow', '0');
      // Click on a child = open a focused single card for that leaf
      c.face.onclick = (e) => {
        e.stopPropagation();
        // Intercept confidential work — show password modal
        if (c.node.label === 'confidential work 🔒' || c.node.label === 'confidential work ð') {
          openConfModal();
          return;
        }
        openLeafCard(c.node);
      };
      activeChildren.push(c);
      // staggered reveal
      setTimeout(() => {
        c.el.style.setProperty('--child-scale', '1');
        c.el.style.setProperty('--child-op', '1');
        c.thread.style.setProperty('--thread-grow', '1');
      }, 60 + i * 55);
    });
  }

  function collapseChildren() {
    if (!activeChildren.length) {
      if (expandedParentId) {
        const pp = pills.find(p => p.node.id === expandedParentId);
        if (pp) pp.el.classList.remove('is-active');
        expandedParentId = null;
      }
      return;
    }
    const leaving = activeChildren.slice();
    activeChildren = [];
    leaving.forEach((c, i) => {
      setTimeout(() => {
        c.el.style.setProperty('--child-scale', '0.2');
        c.el.style.setProperty('--child-op', '0');
        c.thread.style.setProperty('--thread-grow', '0');
      }, i * 25);
      // remove from DOM after the transition
      setTimeout(() => {
        if (c.el.parentNode) c.el.parentNode.removeChild(c.el);
        if (c.thread.parentNode) c.thread.parentNode.removeChild(c.thread);
      }, 420 + i * 25);
    });
    if (expandedParentId) {
      const pp = pills.find(p => p.node.id === expandedParentId);
      if (pp) pp.el.classList.remove('is-active');
    }
    expandedParentId = null;
  }

  // Orient a child thread from parentPos toward childPos.
  function orientChildThread(thread, parentPos, childPos) {
    const dx = childPos.x - parentPos.x;
    const dy = childPos.y - parentPos.y;
    const dz = childPos.z - parentPos.z;
    const horiz = Math.sqrt(dx*dx + dz*dz);
    const dist  = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const az = Math.atan2(-dz, dx) * 180 / Math.PI;
    const el = Math.atan2(dy, horiz) * 180 / Math.PI;
    const startGap = 22, endGap = 20;
    const len = Math.max(0, dist - startGap - endGap);
    thread.style.setProperty('--az', az.toFixed(3) + 'deg');
    thread.style.setProperty('--el', el.toFixed(3) + 'deg');
    thread.style.setProperty('--gap', startGap + 'px');
    thread.style.setProperty('--len', len.toFixed(1) + 'px');
  }

  // --- Side panel (iPod and other persistent artifacts) ---
  let sideOpen = false;
  // `contentHTML` should be a sequence of top-level card elements (.card-block,
  // .profile-card, .ipod-mock, etc.) — they float independently in the stack.
  function openSide(title, contentHTML, opts) {
    opts = opts || {};
    cardstack.innerHTML = contentHTML;
    cardstack.classList.toggle('is-wide', !!opts.wide);
    cardstack.style.display = '';
    stackClose.classList.add('is-visible');
    sideOpen = true;
    // calm the idle drift slightly while reading
    cardsOpen = true;
    // slide the whole constellation left so it sits beside the cards
    universe.classList.add('is-shifted');
  }
  function closeSide() {
    stopClock();
    stopCvClock();
    pauseIPod();
    // fade the cards out, then clear
    const cards = cardstack.children;
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i];
      c.style.transition = 'opacity 280ms var(--ease-spatial), transform 280ms var(--ease-spatial)';
      c.style.opacity = '0';
      c.style.transform = 'translateY(10px) scale(0.98)';
    }
    stackClose.classList.remove('is-visible');
    sideOpen = false;
    cardsOpen = false;
    // slide the constellation back to center
    universe.classList.remove('is-shifted');
    setTimeout(() => {
      if (!sideOpen) { cardstack.innerHTML = ''; cardstack.style.display = 'none'; }
    }, 300);
    pills.forEach(p => p.el.classList.remove('is-active'));
  }
  stackClose.addEventListener('click', () => { collapseChildren(); closeSide(); });

  // ---- iPod (ported from about_14.html) ----
  // buildIPod() / ipodController() are defined later in this script.
  let ipodInstance = null; // { el, ctrl, audio }
  function openIPod(node) {
    closeOverlay();
    if (!ipodInstance) ipodInstance = buildIPod();
    // Mount the iPod's root element inside the floating card stack.
    openSide('listen', '', { wide: true });
    // The ipod root is a bare .ipod element wrapped for the panel.
    const wrap = document.createElement('div');
    wrap.className = 'ipod-panel-wrap';
    wrap.appendChild(ipodInstance.el);
    cardstack.appendChild(wrap);
    // Power on so the menu shows immediately.
    if (ipodInstance.ctrl && ipodInstance.ctrl.powerOn) ipodInstance.ctrl.powerOn();
  }
  function pauseIPod() {
    if (ipodInstance && ipodInstance.ctrl && ipodInstance.ctrl.pause) ipodInstance.ctrl.pause();
  }

  // Content registry: maps node id (or child node) to an array of card descriptors.
  function cardsFor(node) {
    // ABOUT ME is handled by its own rich panel (openAboutPanel), not here.
    const intro = `<div class="card-block"><div class="ct">${titleFor(node.id) || node.label}</div><div class="cb">${bodyFor(node.id)}</div></div>`;
    // Only the reference / link collections show a list under the copy.
    // Name-only sections (books, films, weird obsessions, influences, tools, notes)
    // show just the copy; their items remain reachable as orbit nodes.
    const SHOW_LIST = { refs: 1, artifacts: 1, sns: 1, fss: 1, practice: 1 };
    if (node.children && node.children.length && SHOW_LIST[node.id]) {
      const rows = node.children.map(label => listRow(node.id, label)).join('');
      const listCard = `<div class="card-block"><div class="cb"><div class="ref-list">${rows}</div></div></div>`;
      return intro + listCard;
    }
    return intro;
  }

  // Section titles shown on the intro card.
  function titleFor(id) {
    const t = {
      practice: 'Practice', fss: 'futuresupersonic', designer: 'Conceptual Designer',
      cv: 'CV / Resume', books: 'Books', refs: 'Design References', films: 'Films',
      obsess: 'Weird Obsessions', influence: 'Influences', artifacts: 'Internet Artifacts',
      listen: 'Listen', sns: 'Social', notes: 'Notes',
    };
    return t[id] || '';
  }

  // Section body copy shown on the intro card.
  function bodyFor(id) {
    const d = {
      practice: `A body of work spanning client projects, independent experiments, speculative systems, previous identities, and protected case studies. Practice is the broad container for everything Benjamin makes.`,
      fss: `futuresupersonic is Benjamin’s independent creative practice — a space for self-initiated work, limited objects, publications, and ideas that exist outside of client structures.`,
      designer: `Benjamin operates at the intersection of behavior, culture, systems, and imagination. His approach draws on industrial design, experience strategy, behavioral systems, and conceptual thinking.`,
      cv: `A structured overview of Benjamin’s experience, selected work, education, and tools. Available as a downloadable PDF on request.`,
      books: `A small collection of books that changed how I think about culture, cities, systems, design, and human behavior. Some introduced new ideas. Others simply gave language to things I already felt but couldn’t yet describe.`,
      refs: `A collection of principles, tools, archives, and references I return to regularly. Some shape how I think. Others simply remind me what’s possible.`,
      films: `Stories, worlds, documentaries, and speculative futures that continue to influence how I think about technology, society, identity, and design.`,
      obsess: `The things I spend far too much time thinking about. Behavioral systems, invisible intelligence, cultural symbols, information structures, old motorcycles, winter toques.`,
      influence: `Less heroes, more recurring signals. These are the people, ideas, and movements I find myself returning to when I’m trying to understand how things are made, experienced, and remembered.`,
      artifacts: `Small corners of the internet that feel like references, memories, tools, portals, or strange little cultural objects.`,
      sns: `A small collection of places where I occasionally exist online. Most accounts are intentionally quiet, partially private, or rarely updated.`,
      notes: `Fragments. Ideas, reminders, observations, questions, quotes, unfinished thoughts, and things I don’t want to forget.`,
      listen: `A small listening room. Not a definitive playlist. More like an audio snapshot of mood, memory, rhythm, atmosphere, and influence.`,
    };
    return d[id] || '';
  }

  // Optional small footnote under a list.
  function footNote(id) {
    const n = { books: 'The big red book.' };
    return n[id] ? `<div class="ref-foot">${n[id]}</div>` : '';
  }

  // One row in a list card: subtle link if a URL exists, else plain text.
  function listRow(id, label) {
    const meta = (ITEM_META[id] && ITEM_META[id][label]) || null;
    const desc = (meta && meta.desc) ? `<span class="ref-desc">${meta.desc}</span>` : '';
    const name = (meta && meta.href)
      ? `<a class="ref-link" href="${meta.href}" target="_blank" rel="noopener">${label}</a>`
      : `<span class="ref-name">${label}</span>`;
    return `<div class="ref-row">${name}${desc}</div>`;
  }

  // Kept for the orbit leaf-card path (openLeafCard); harmless if unused.
  function childBlurb(parentId, label) {
    const meta = (ITEM_META[parentId] && ITEM_META[parentId][label]) || null;
    if (meta && meta.href) return `<a href="${meta.href}" target="_blank" rel="noopener">${meta.desc || label}</a>`;
    return (meta && meta.desc) || '';
  }

  let clockTimer = null;
  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function startClock() {
    const tick = () => {
      const el = document.getElementById('apClock');
      if (!el) { stopClock(); return; }
      const d = new Date();
      el.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    };
    tick();
    clockTimer = setInterval(tick, 1000);
  }
  function stopClock() { if (clockTimer) { clearInterval(clockTimer); clockTimer = null; } }

  window.__invadersOutcome = function(outcome) {

              : outcome === 'lost' ? 'defeated — press start to retry'
              : 'invaders';

  const anchorEl = universe.querySelector('.anchor');

    let aDownX = 0, aDownY = 0, aMoved = false;
    anchorEl.addEventListener('mousedown', e => {
      aDownX = e.clientX; aDownY = e.clientY; aMoved = false;
    });
    anchorEl.addEventListener('mousemove', e => {
      if (Math.abs(e.clientX - aDownX) > 4 || Math.abs(e.clientY - aDownY) > 4) aMoved = true;
    });
    anchorEl.addEventListener('click', e => {
      if (aMoved) return;            // it was a drag-to-orbit, not a click
