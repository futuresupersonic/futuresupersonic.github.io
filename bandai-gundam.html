<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Bandai Gundam</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />

        <style>
            :root {
                --bg: #f6f6f6;
                --text: rgb(43, 23, 3);
                --muted: rgba(43, 23, 3, 0.45);
                --pill-bg: #eeeeee;
                --pill-bg-hover: #e4e4e4;
                --accent: #b7ff00;
                --radius: 45px;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                background: var(--bg);
                color: var(--text);
                font-family: "Instrument Sans", Arial, sans-serif;
                font-size: 12px;
                letter-spacing: -0.05px;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                background: var(--bg);
            }

            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 30px;
            }

            .staticrypt-form {
                width: 320px;
                max-width: 100%;
                text-align: left;
            }

            .staticrypt-instructions {
                margin-bottom: 18px;
            }

            .staticrypt-title {
                font-size: 12px;
                font-weight: 500;
                margin: 0 0 10px;
            }

            .staticrypt-instructions p:last-child {
                font-size: 12px;
                line-height: 1.6;
                color: var(--muted);
                margin: 0;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid rgba(43, 23, 3, 0.12);
                margin: 18px 0;
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--pill-bg);
                width: 100%;
                margin: 0 0 8px;
                border-radius: var(--radius);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: inherit;
                border: 0;
                color: var(--text);
                font-family: inherit;
                font-size: 12px;
                letter-spacing: -0.05px;
                outline: 0;
                padding: 6px 34px 6px 5px;
                height: 25px;
                width: 100%;
            }

            .staticrypt-form input::placeholder { color: var(--muted); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 14px;
                width: 14px;
                opacity: 0.4;
                padding: 0;
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: inherit;
                font-size: 12px;
                letter-spacing: -0.05px;
                text-transform: none;
                outline: 0;
                background: #ffffff;
                width: 100%;
                height: 25px;
                border: 1px solid rgba(43, 23, 3, 0.12);
                padding: 0 5px;
                color: var(--text);
                cursor: pointer;
                transition: background 120ms ease, border-color 120ms ease;
                border-radius: var(--radius);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent);
                border-color: transparent;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin: 8px 0 0;
                font-size: 12px;
                color: var(--muted);
            }

            .staticrypt-remember input[type="checkbox"] {
                margin-right: 8px;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 1.5rem;
                height: 1.5rem;
                border: 2px solid rgba(43, 23, 3, 0.25);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">

                    </form>
                </div>
            </div>
