<head>
<meta charset="UTF-8" />

<title>futuresupersonic — benjamin lemar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
<style>
:root{
  --radius: 45px;
  --bg: #f6f6f6;
  --ink: rgb(43, 23, 3);
  --lime: #b7ff00;
  --pill-bg: #eeeeee;
  --pill-bg-hover: #e4e4e4;
  --text: var(--ink);
  --accent: var(--lime);
  --fs: clamp(13px, 1.2vw, 14px);
  --ls: -0.005em;
  --gutter: 30px;
  --content-max: 1332px;
  --nav-gap: 11px;
  --nav-h: 25px;
  --nav-fs: clamp(12px, 2vw, 12.6px);
  --ease-1: cubic-bezier(0.33, 0, 0, 1);
  --ease-gooey: cubic-bezier(0.34, 1.18, 0.5, 1);

  /* nav pill widths — 3-pill layout (matched to index.html) */
  --nav-home:     49.55%;
  --nav-practice: 24.40%;
  --nav-fss:      24.40%;

  /* film panel */
  --film-w: 440px;
  --film-radius: 40px;
}
*{ box-sizing: border-box; }
html, body{ margin: 0; }
body{
  min-height: 100vh; min-height: 100dvh;
  background: var(--bg); color: var(--ink);
  font-family: "Instrument Sans", -apple-system, system-ui, sans-serif;
  font-size: var(--fs); letter-spacing: var(--ls); line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}
a{ color: inherit; text-decoration: none; }
button{ font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

/* =========================================================
   HEADER / NAV — matched to index.html
   ========================================================= */
.header_wrapper{
  position: fixed; top: 12px;
  padding: 30px 0; min-height: 86px; box-sizing: border-box;
  left: 0; right: 0; z-index: 100;
  background: transparent;
  pointer-events: none;
}
.header_wrapper .nav-pill,
.header_wrapper .nav-pill *{ pointer-events: auto; }
.header_wrapper .container{
  width: 100%;
  max-width: calc(var(--content-max) + var(--gutter) * 2);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.nav-row{ display: flex; gap: var(--nav-gap); width: 100%; }
.nav-pill{
  border-radius: var(--radius);
  display: inline-flex; align-items: center; justify-content: flex-start;
  height: var(--nav-h); padding: 0 10px;
  background: var(--pill-bg); color: var(--text);
  font-size: var(--nav-fs); line-height: 1; letter-spacing: var(--ls);
  cursor: pointer; white-space: nowrap;
  user-select: none;
  transition: background 120ms var(--ease-1);
  width: auto; flex: 0 0 auto; position: relative;
}
.nav-pill:hover{ background: var(--accent); }
.nav-pill.home{ overflow: hidden; text-overflow: ellipsis; width: var(--nav-home); }
.nav-pill.nav-practice{ width: var(--nav-practice); }
.nav-pill.nav-fss{ width: var(--nav-fss); }
.nav-pill.home .name-full{ display: inline; }
.nav-pill.home .name-short{ display: none; }

/* =========================================================
   STAGE
   ========================================================= */
main.container{
  width: 100%;
  max-width: calc(var(--content-max) + var(--gutter) * 2);
  margin: 0 auto;
  padding: 98px var(--gutter) 24px;
  flex: 1 1 auto;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.stack{ width: var(--film-w); max-width: calc(100vw - 24px); }

.film{
  position: relative;
  width: 100%;
  aspect-ratio: 520 / 655;
  border-radius: var(--film-radius);
  overflow: hidden;
  background: #0d0d0d;
  cursor: pointer;
  box-shadow: 0 26px 54px rgba(43,23,3,0.10), 0 7px 18px rgba(43,23,3,0.06);
}
.film video{
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  border-radius: var(--film-radius);
  -webkit-clip-path: inset(0 round var(--film-radius));
          clip-path: inset(0 round var(--film-radius));
}
.play{
  position: absolute; left: 50%; top: 67%;
  transform: translate(-50%, -50%);
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(246,246,246,0.92); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 22px rgba(0,0,0,0.20);
  transition: background 160ms var(--ease-1), transform 240ms var(--ease-gooey), opacity 200ms var(--ease-1);
}
.play:hover{ background: var(--lime); }
.play svg{ margin-left: 3px; }
.film.is-playing .play{ opacity: 0; pointer-events: none; transform: translate(-50%,-50%) scale(0.78); }

.caption{ margin-top: 18px; text-align: left; }
.title{ margin: 0 0 7px; font-size: var(--fs); font-weight: 500; color: var(--ink); letter-spacing: var(--ls); }
.desc{ margin: 0; font-size: var(--fs); font-weight: 400; color: rgba(43,23,3,0.45); max-width: 248px; line-height: 1.5; }

/* =========================================================
   FOOTER
   ========================================================= */
.site-footer{ padding: 0 var(--gutter) 26px; text-align: center; }
.back{
  display: inline-flex; align-items: center; gap: 7px;
  color: rgba(43,23,3,0.5); font-size: var(--nav-fs);
  transition: color 160ms var(--ease-1);
}
.back:hover{ color: var(--ink); }

@media (max-width: 720px){
  :root{ --gutter: 12px; --nav-gap: 8px; }
  .nav-row{ flex-wrap: nowrap; justify-content: flex-start; align-items: center; gap: 8px; overflow: visible; }
  .nav-pill{ flex: 0 0 auto; width: auto; }
  .nav-pill.home, .nav-pill.nav-practice, .nav-pill.nav-fss{ width: auto; }
  .nav-pill.home{ flex: 1 1 0; min-width: 0; order: 1; }
  .nav-pill.home .name-full{ display: none; }
  .nav-pill.home .name-short{ display: inline; }
  .nav-pill.nav-practice{ order: 2; flex: 0 0 auto; }
  .nav-pill.nav-fss{ order: 3; flex: 0 0 auto; }
  main.container{ padding-top: 86px; }
}
</style>

<script>
(function(){
  var film = document.getElementById('film');
  var vid  = document.getElementById('vid');
  film.addEventListener('click', function(){
    if (vid.paused){
      vid.muted = false;
      var p = vid.play();
      if (p && p.catch){ p.catch(function(){ vid.muted = true; vid.play(); }); }
      film.classList.add('is-playing');
    } else {
      vid.pause();
      film.classList.remove('is-playing');
    }
  });
  vid.addEventListener('ended', function(){
    film.classList.remove('is-playing');
    vid.load();
  });
})();
</script>
